<style>
  :root{
    --c-found:#6b7280; --c-analysis:#2563eb; --c-algebra:#dc2626;
    --c-geom:#059669; --c-prob:#7c3aed; --c-disc:#d97706; --c-app:#0891b2;
    --bg:#0f172a; --panel:#1e293b; --panel2:#334155;
    --txt:#e2e8f0; --txt-dim:#94a3b8; --accent:#38bdf8;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--txt);overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh}
  header{background:var(--panel);border-bottom:1px solid var(--panel2);padding:10px 16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  header h1{font-size:18px;font-weight:600;white-space:nowrap}
  header h1 .sub{color:var(--txt-dim);font-weight:400;font-size:13px;margin-left:6px}
  .tabs{display:flex;gap:4px;margin-left:auto}
  .tab{background:transparent;border:1px solid var(--panel2);color:var(--txt-dim);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .15s}
  .tab:hover{color:var(--txt);border-color:var(--accent)}
  .tab.active{background:var(--accent);color:#0f172a;border-color:var(--accent);font-weight:600}
  main{flex:1;display:flex;overflow:hidden}
  #cy-wrap{flex:1;position:relative}
  #cy{width:100%;height:100%;background:radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%)}
  aside{width:280px;flex:0 0 280px;background:var(--panel);border-right:1px solid var(--panel2);overflow-y:auto;display:none;flex-direction:column}
  aside.show{display:flex}
  aside .group{border-bottom:1px solid var(--panel2)}
  aside .group-title{padding:10px 14px;font-size:12px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px;background:#0f172a;font-weight:600}
  aside .item{padding:10px 14px;cursor:pointer;font-size:14px;border-left:3px solid transparent;transition:all .12s}
  aside .item:hover{background:var(--panel2)}
  aside .item.active{background:var(--panel2);border-left-color:var(--accent);color:var(--accent)}
  aside .item .meta{font-size:11px;color:var(--txt-dim);margin-top:2px}
  aside .search-box{padding:12px;position:sticky;top:0;background:var(--panel);border-bottom:1px solid var(--panel2);z-index:2}
  aside input{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--panel2);background:#0f172a;color:var(--txt);font-size:13px}
  aside input:focus{outline:none;border-color:var(--accent)}
  #detail{position:fixed;top:0;right:0;width:420px;height:100vh;background:var(--panel);box-shadow:-4px 0 20px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .25s;z-index:50;display:flex;flex-direction:column}
  #detail.show{transform:translateX(0)}
  #detail .dhead{padding:16px 20px;border-bottom:1px solid var(--panel2);display:flex;align-items:flex-start;gap:12px}
  #detail .dhead .dot{width:14px;height:14px;border-radius:50%;margin-top:4px;flex-shrink:0}
  #detail .dhead h2{font-size:19px;font-weight:600}
  #detail .dhead .layer{font-size:12px;color:var(--txt-dim);margin-top:2px}
  #detail .dclose{margin-left:auto;background:var(--panel2);border:none;color:var(--txt);width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;flex-shrink:0}
  #detail .dclose:hover{background:#475569}
  #detail .dbody{flex:1;overflow-y:auto;padding:18px 20px 30px}
  #detail .section{margin-bottom:18px}
  #detail .section h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--accent);margin-bottom:6px;font-weight:600}
  #detail .section p{font-size:14px;line-height:1.7;color:var(--txt)}
  #detail .section .pill{display:inline-block;background:var(--panel2);color:var(--txt);padding:3px 10px;border-radius:12px;font-size:12px;margin:3px 6px 3px 0;cursor:pointer}
  #detail .section .pill:hover{background:var(--accent);color:#0f172a}
  #detail .res-item{font-size:13px;padding:6px 0;border-bottom:1px dashed var(--panel2);line-height:1.5}
  #detail .res-item .tag{font-size:10px;background:var(--panel2);padding:1px 6px;border-radius:3px;margin-right:6px;color:var(--txt-dim)}
  #detail .depth-row{font-size:13px;padding:7px 0;border-bottom:1px dashed var(--panel2);display:flex;gap:8px;align-items:flex-start}
  #detail .depth-row .goal{color:var(--accent);min-width:90px;font-weight:500}
  #pathbar{background:var(--panel);border-top:1px solid var(--panel2);padding:10px 16px;font-size:13px;display:none;color:var(--txt-dim);line-height:1.5}
  #pathbar.show{display:block}
  #pathbar b{color:var(--accent)}
  .legend{position:absolute;bottom:12px;left:12px;background:rgba(30,41,59,.92);border:1px solid var(--panel2);border-radius:8px;padding:10px 12px;font-size:12px;display:flex;flex-direction:column;gap:5px;z-index:10}
  .legend .row{display:flex;align-items:center;gap:8px}
  .legend .dot{width:12px;height:12px;border-radius:50%}
  .hint{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.92);border:1px solid var(--panel2);border-radius:20px;padding:6px 16px;font-size:12px;color:var(--txt-dim);z-index:10;max-width:80%;text-align:center}
  .hint b{color:var(--accent)}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#475569}
  /* 进度条 */
  .progress-wrap{display:flex;align-items:center;gap:8px;margin-left:8px}
  .progress-track{width:100px;height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,#22c55e,#86efac);width:0%;transition:width .4s;border-radius:4px}
  .progress-label{font-size:12px;color:var(--txt-dim);white-space:nowrap}
  .reset-btn{background:var(--panel2);border:none;color:var(--txt-dim);width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:13px}
  .reset-btn:hover{background:#f97316;color:#fff}
  /* focusbar */
  .focusbar{position:absolute;top:48px;left:50%;transform:translateX(-50%);background:rgba(30,41,59,.95);border:1px solid var(--accent);border-radius:10px;padding:8px 16px;font-size:12px;color:var(--txt);max-width:85%;line-height:1.6;display:none;z-index:11}
  .focusbar.show{display:block}
  .mini-btn{background:var(--panel2);border:1px solid var(--accent);color:var(--accent);padding:3px 10px;border-radius:5px;cursor:pointer;font-size:11px;margin-left:6px}
  .mini-btn:hover{background:var(--accent);color:#0f172a}
  /* 详情面板的 pill 状态色 */
  .pill.done{background:#14532d;color:#86efac;border:1px solid #22c55e}
  .pill.gap{background:#7c2d12;color:#fdba74;border:1px solid #f97316}
  /* 大按钮 */
  .big-btn{width:100%;padding:12px;border-radius:8px;border:2px solid #22c55e;background:transparent;color:#22c55e;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s}
  .big-btn:hover{background:#22c55e;color:#0f172a}
  .big-btn.done{background:#22c55e;color:#0f172a}
  .big-btn.done:hover{background:transparent;color:#22c55e}
  /* 收藏面板 */
  .starred-panel{position:absolute;right:12px;top:60px;width:200px;background:rgba(30,41,59,.95);border:1px solid var(--panel2);border-radius:8px;z-index:10;max-height:60vh;overflow:hidden;display:flex;flex-direction:column}
  .starred-head{padding:8px 12px;font-size:13px;font-weight:600;border-bottom:1px solid var(--panel2);color:var(--accent)}
  .starred-hint{font-size:10px;color:var(--txt-dim);font-weight:400;margin-left:6px}
  .starred-list{overflow-y:auto;padding:4px 0;max-height:50vh}
  .starred-list .item{padding:6px 12px;font-size:13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
  .starred-list .item:hover{background:var(--panel2)}
  .starred-list .unstar{color:var(--txt-dim);cursor:pointer;font-size:11px;padding:0 4px}
  .starred-list .unstar:hover{color:#f97316}
  .star-empty{padding:12px;font-size:12px;color:var(--txt-dim);text-align:center}
  /* 知识点清单 */
  /* 知识点清单（可点击勾选 + 就地展开定义） */
  .items-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;align-items:flex-start}
  .kp-wrap{display:flex;flex-direction:column;gap:0;min-width:0}
  .kp{display:inline-flex;align-items:center;gap:5px;background:var(--panel2);color:var(--txt);padding:4px 10px;border-radius:5px;font-size:12px;line-height:1.4;cursor:pointer;transition:background .15s,border-color .15s;border:1px solid transparent;user-select:none}
  .kp:hover{background:#475569;border-color:var(--accent)}
  .kp-chk{font-size:11px;color:var(--txt-dim);font-weight:600;cursor:pointer;padding:0 2px}
  .kp-chk:hover{color:var(--accent)}
  .kp-text{cursor:pointer}
  .kp-open{border-color:var(--accent);background:#475569}
  .kp-done{background:rgba(34,197,94,.18);border-color:#22c55e;color:#86efac}
  .kp-done .kp-chk{color:#22c55e}
  .kp-desc{display:none;font-size:11px;color:var(--txt-dim);line-height:1.45;background:rgba(15,23,42,.6);border-radius:0 0 5px 5px;padding:5px 9px;margin-top:-2px;border-left:2px solid var(--accent);border-right:1px solid var(--panel2);border-bottom:1px solid var(--panel2)}
  /* 质量等级 qa 徽章 */
  .qa-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;letter-spacing:.3px;vertical-align:middle;margin-left:8px;cursor:help}
  .qa-A{background:#14532d;color:#86efac;border:1px solid #22c55e}
  .qa-B{background:#1e3a8a;color:#93c5fd;border:1px solid #3b82f6}
  .qa-C{background:#7c2d12;color:#fdba74;border:1px solid #f97316}

    items:[{t:'正数和负数',d:'大于零的数为正数，小于零的数为负数，零既不是正数也不是负数。'},{t:'有理数的概念',d:'能表示为两个整数之比（分数）的数，包括整数和分数。'},{t:'有理数的分类',d:'按符号分为正有理数、零、负有理数；按整数性分为整数和分数。'},{t:'数轴',d:'规定了原点、正方向和单位长度的直线，用来直观表示数的大小。'},{t:'相反数',d:'只有符号不同的两个数互为相反数，它们的和为零。'},{t:'绝对值',d:'数轴上表示数的点到原点的距离，非负数 |a|≥0。'},{t:'有理数大小比较',d:'数轴上右边的点表示的数大于左边；正数＞0＞负数。'},{t:'有理数加减乘除',d:'先定符号再算绝对值；同号相加取同号，异号相加取绝对值大者的符号。'},{t:'有理数乘方',d:'求 n 个相同因数乘积的运算 aⁿ，a 是底数，n 是指数。'},{t:'有理数混合运算',d:'先乘方，再乘除，最后加减；有括号先算括号内。'},{t:'科学记数法',d:'把一个数写成 a×10ⁿ（1≤|a|＜10）的形式，便于表示很大或很小的数。'},{t:'近似数',d:'与实际数值接近但不完全相等的数，通过四舍五入等方法得到。'},{t:'有效数字',d:'从左边第一个非零数字起到末位数字止的所有数字。'},{t:'平方根',d:'若 x²=a，则 x 是 a 的平方根；正数有两个互为相反数的平方根。'},{t:'算术平方根',d:'正数 a 的正的平方根，记作 √a；零的算术平方根是零。'},{t:'立方根',d:'若 x³=a，则 x 是 a 的立方根 ∛a；每个实数都有唯一立方根。'},{t:'无理数',d:'不能表示为两个整数之比的数，即无限不循环小数（如 √2、π）。'},{t:'实数的概念',d:'有理数和无理数统称实数，与数轴上的点一一对应。'},{t:'实数与数轴',d:'每个实数都对应数轴上唯一一点，反之亦然，建立了数与形的桥梁。'},{t:'实数运算',d:'实数可进行加、减、乘、除（除数不为零）、乘方、开方运算。'},{t:'二次根式的概念与性质',d:'形如 √a（a≥0）的式子，满足 (√a)²=a、√(a²)=|a|。'},{t:'最简二次根式',d:'被开方数不含能开尽方的因数且不含分母的二次根式。'},{t:'二次根式四则运算',d:'加减先化简再合并同类二次根式；乘除用 √a·√b=√(ab)、√a/√b=√(a/b)。'},{t:'用字母表示数',d:'用字母代替具体数字，使运算关系具有一般性。'},{t:'代数式',d:'用基本运算符号连接数与字母的式子（如 2x+3）。'},{t:'代数式的值',d:'用具体数值代替代数式里的字母，按运算符号计算所得的结果。'},{t:'单项式与多项式',d:'单项式是数与字母的积，多项式是几个单项式的和。'},{t:'整式',d:'单项式和多项式统称整式，分母中不含字母。'},{t:'同类项与合并同类项',d:'所含字母相同且相同字母指数也相同的项；系数相加合并。'},{t:'整式加减',d:'去括号后合并同类项，注意括号前是负号时各项变号。'},{t:'幂的运算性质',d:'aᵐ·aⁿ=aᵐ⁺ⁿ、(aᵐ)ⁿ=aᵐⁿ、(ab)ⁿ=aⁿbⁿ，幂运算的基础。'},{t:'整式乘法',d:'单项式乘单项式、单项式乘多项式、多项式乘多项式（分配律）。'},{t:'乘法公式（平方差、完全平方）',d:'(a+b)(a-b)=a²-b²、(a±b)²=a²±2ab+b²。'},{t:'因式分解（提公因式、公式法）',d:'把多项式化为几个整式乘积的形式，是乘法的逆运算。'},{t:'分式的概念',d:'分母中含有字母的有理式（如 1/x），分母不能为零。'},{t:'分式基本性质',d:'分子分母同乘（或除以）同一个不为零的整式，分式值不变。'},{t:'分式四则运算',d:'通分后加减、约分后乘除，关键是找最简公分母。'},{t:'分式化简求值',d:'先约分化简，再代入数值计算，注意字母取值使分式有意义。'}],

    items_src:'人教版初高中数学教材（整理自 mewamew/math-atlas）',
    res:[{t:'3Blue1Brown《函数图像可视化》',k:'视频',lang:'英'},{t:'《普林斯顿微积分读本》前2章',k:'书',lang:'英'}],
    depth:[{g:'任何方向',d:'看到常见函数（幂、指数、对数、三角）能秒想出图像形状。'}],

    items_src:'人教版初高中数学教材（整理自 mewamew/math-atlas）',

  /* --- 补全 leads 占位符对应的目标路径（原为悬空引用，现补为正式路径） --- */

    steps:[

      {id:'prob', depth:'风险中性测度、鞅。'},

  analytic_nt:{name:'解析数论', field:'密码学与安全', summary:'用分析方法研究素数分布（黎曼猜想、素数定理）。纯数论的现代前沿。',
    steps:[
      {id:'numtheory', depth:'基础：素数、同余、欧拉定理。'},
      {id:'complex', depth:'核心工具：黎曼 zeta 函数、复积分。'},
      {id:'stats', depth:'素数分布的统计性质。'},

};
</script>
<script>
/* ========== 渲染与交互层 ========== */
const layerColor = id => LAYERS[NODES[id].layer].color;

/* ---- 进度状态系统 ---- */
// mastered: 用户标记已掌握的节点 id 集合，存 localStorage
let mastered = loadMastered();
function loadMastered(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_mastered')||'[]')); }
  catch(e){ return new Set(); }
}
function saveMastered(){ localStorage.setItem('mathatlas_mastered', JSON.stringify([...mastered])); }
// masteredItems: 知识点粒度的掌握集合，元素编码 `${nodeId}::${idx}`
let masteredItems = loadMasteredItems();
function loadMasteredItems(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_mastered_items')||'[]')); }
  catch(e){ return new Set(); }
}
function saveMasteredItems(){ localStorage.setItem('mathatlas_mastered_items', JSON.stringify([...masteredItems])); }
// 某节点的知识点是否全部勾选
function allItemsDone(id){
  const its = NODES[id].items||[];
  if(its.length===0) return false;
  return its.every((_,i)=>masteredItems.has(id+'::'+i));
}
// 某节点已勾选的知识点数
function countItemsDone(id){
  const its = NODES[id].items||[];
  return its.filter((_,i)=>masteredItems.has(id+'::'+i)).length;
}
// 展开/收起某个知识点的定义（就地展开）
function toggleDesc(key){
  const desc = document.querySelector('.kp-desc[data-desc="'+key+'"]');
  if(desc){
    const open = desc.style.display === 'block';
    desc.style.display = open ? 'none' : 'block';
    // 展开时让对应的 kp 标签高亮
    const kp = document.querySelector('.kp[data-kp="'+key+'"]');
    if(kp) kp.classList.toggle('kp-open', !open);
  }
}
// 切换某个知识点的掌握状态，并联动节点掌握（全勾⇒自动掌握，取消则解除）
function toggleItem(nodeId, idx){
  const key = nodeId+'::'+idx;
  if(masteredItems.has(key)) masteredItems.delete(key); else masteredItems.add(key);
  saveMasteredItems();
  // 联动：全勾则掌握节点；否则若之前因全勾而掌握（非手动锁定），现在解除
  const wasMastered = mastered.has(nodeId);
  if(allItemsDone(nodeId)){ mastered.add(nodeId); saveMastered(); }
  else if(wasMastered && !autoMasterLock.has(nodeId)){ mastered.delete(nodeId); saveMastered(); }
  // 局部更新：只刷新被点击的知识点样式 + 底部掌握按钮，不重渲染整个面板（避免跳动）
  const kp = document.querySelector('.kp[data-kp="'+nodeId+'::'+idx+'"]');
  if(kp){
    const done = masteredItems.has(key);
    kp.classList.toggle('kp-done', done);
    kp.setAttribute('data-done', done?'1':'0');
    const chkEl = kp.querySelector('.kp-chk');
    if(chkEl) chkEl.textContent = done ? '✓' : '○';
  }
  // 更新掌握按钮文字（全勾时变"已掌握"）
  const wasAuto = allItemsDone(nodeId);
  const btn = document.querySelector('.big-btn');
  if(btn){ btn.classList.toggle('done', wasMastered||wasAuto); btn.textContent = (wasMastered||wasAuto)?'✓ 已掌握（点击取消）':'标记为已掌握'; }
  // 更新标题里的 "X/Y 已掌握" 计数
  const srcEl = document.querySelector('.items-src');
  if(srcEl){ const dn=countItemsDone(nodeId), tot=(NODES[nodeId].items||[]).length; srcEl.textContent = '（'+dn+'/'+tot+' 已掌握'+(NODES[nodeId].items_src?(' · 来源：'+NODES[nodeId].items_src):'')+'）'; }
  cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); });
  updateProgress();
}
// autoMasterLock: 用户手动标记掌握的节点（不经知识点勾选），解除时不应被自动删除
let autoMasterLock = loadAutoMasterLock();
function loadAutoMasterLock(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_autolock')||'[]')); }
  catch(e){ return new Set(); }
}
function saveAutoMasterLock(){ localStorage.setItem('mathatlas_autolock', JSON.stringify([...autoMasterLock])); }
// 推荐状态：前置全部已掌握 => 'recommended'；否则 'pending'。不设锁，所有节点可点。
function nodeStatus(id){
  if(mastered.has(id)) return 'mastered';
  const pr = NODES[id].prereq||[];
  if(pr.length===0 || pr.every(p=>mastered.has(p))) return 'recommended';
  return 'pending';
}
// 反查：哪些目标路径包含某节点（用于"学完能解锁什么"）
function goalsUsing(id){
  return Object.entries(PATHS).filter(([_,p])=>p.steps.some(s=>s.id===id)).map(([k,p])=>p.name);
}

function buildElements(){
  const nodes = Object.entries(NODES).map(([id,n])=>({
    data:{id, label:n.name, layer:n.layer, color:layerColor(id), status:nodeStatus(id), qa:n.qa}
  }));
  const edges = [];
  Object.entries(NODES).forEach(([id,n])=>{(n.prereq||[]).forEach(p=>{if(NODES[p]) edges.push({data:{source:p,target:id}});});});
  return [...nodes, ...edges];
}

let cy=null, currentMode='atlas', currentPath=null, focusedNode=null, isGlobalView=false;
// ---- 视图状态持久化（聚焦节点/路径/模式），刷新后恢复 ----
// 存到 localStorage key 'mathatlas_view'，避免刷新/强刷丢失"我在看什么"
let viewState = loadViewState();
function loadViewState(){
  try{ return JSON.parse(localStorage.getItem('mathatlas_view')||'{}'); }
  catch(e){ return {}; }
}
function saveViewState(){
  localStorage.setItem('mathatlas_view', JSON.stringify({
    mode: currentMode, path: currentPath, focused: focusedNode, ts: Date.now()
  }));
}
// 清除视图状态（退出聚焦/回全景时调用）
function clearViewState(){
  focusedNode=null; currentPath=null;
  localStorage.setItem('mathatlas_view', JSON.stringify({mode:currentMode}));
}
let starred = loadStarred();
function loadStarred(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_starred')||'[]')); }
  catch(e){ return new Set(); }
}
function saveStarred(){ localStorage.setItem('mathatlas_starred', JSON.stringify([...starred])); }
function toggleStar(id){
  if(starred.has(id)) starred.delete(id); else starred.add(id);
  saveStarred();
  cy.getElementById(id).toggleClass('starred', starred.has(id));
  renderStarred();
}
function renderStarred(){
  const el = document.getElementById('starred-list');
  if(!el) return;
  if(starred.size===0){ el.innerHTML='<div class="star-empty">右键节点可收藏到这里</div>'; return; }
  el.innerHTML = [...starred].map(id=>'<div class="item" onclick="focusNode(\''+id+'\')">'+(mastered.has(id)?'✓ ':'')+' '+NODES[id].name+'<span class="unstar" onclick="event.stopPropagation();toggleStar(\''+id+'\')">✕</span></div>').join('');
}

function initCytoscape(){
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: buildElements(),
    style: [
      // 基础节点样式：状态决定外观
      {selector:'node', style:{'label':'data(label)','text-valign':'center','text-halign':'center','background-color':'data(color)','color':'#fff','font-size':'10px','width':'label','height':'label','padding':'10px','shape':'round-rectangle','text-wrap':'wrap','text-max-width':'90px','border-width':'1px','border-color':'rgba(255,255,255,.15)','opacity':0.25,'transition-property':'opacity, border-color, border-width','transition-duration':'.25s'}},
      // 推荐（前置已满足）：亮起
      {selector:'node[status="recommended"]', style:{'opacity':0.9,'border-color':'#fbbf24','border-width':'2px'}},
      // 进行中（pending 但有前置未满足）：正常显示但稍暗
      {selector:'node[status="pending"]', style:{'opacity':0.4}},
      // 已掌握：绿勾边框 + 高亮
      {selector:'node[status="mastered"]', style:{'opacity':1,'border-color':'#22c55e','border-width':'3px'}},
      // 交互态
      // 交互态（前后置用高对比互补色，与层级填充色彻底分离；focused 用白框最突出）
      {selector:'.focused', style:{'border-color':'#ffffff','border-width':'4px','opacity':1}},
      {selector:'.prereq-node', style:{'border-color':'#22d3ee','border-width':'2px','opacity':0.95}},
      {selector:'.next-node', style:{'border-color':'#fb923c','border-width':'2px','opacity':0.95}},
      {selector:'.dim', style:{'opacity':.08}},
      {selector:'.path-gap', style:{'border-color':'#f97316','border-width':'4px','opacity':1}},
      {selector:'.path-done', style:{'border-color':'#22c55e','border-width':'3px','opacity':1}},
      {selector:'edge', style:{'width':1.5,'line-color':'#64748b','target-arrow-color':'#64748b','target-arrow-shape':'triangle','arrow-scale':.8,'curve-style':'bezier','opacity':.4}},
      {selector:'.path-edge', style:{'line-color':'#f97316','target-arrow-color':'#f97316','opacity':.95,'width':3}},
      {selector:'.link-edge', style:{'line-color':'#94a3b8','target-arrow-color':'#94a3b8','opacity':.65,'width':2}},
      // 前置边（指向当前节点）：青；后续边（从当前节点指出）：橙 —— 用连线方向区分前后置，比仅靠节点边框明显得多
      {selector:'.prereq-edge', style:{'line-color':'#22d3ee','target-arrow-color':'#22d3ee','opacity':.95,'width':3}},
      {selector:'.next-edge', style:{'line-color':'#fb923c','target-arrow-color':'#fb923c','opacity':.95,'width':3}},
      {selector:'.path-ctx', style:{'border-color':'#e879f9','border-width':'2px','opacity':0.95,'border-style':'dashed'}},
      // 鱼眼：悬停区放大
      {selector:'.fish-big', style:{'width':'label','height':'label','padding':'16px','font-size':'13px','opacity':1,'z-index':99}},
      {selector:'.fish-mid', style:{'opacity':0.85}},
      // 收藏标记
      {selector:'.starred', style:{'border-color':'#fbbf24','border-style':'double','border-width':'5px'}},
      // 手动定位（拖动后）
      {selector:'.pinned', style:{}},
      // 质量等级 A（人教版课标背书）：节点名后加金色 ★ 前缀，一眼区分权威内容（与 starred 的双边框区分）
      {selector:'node[qa="A"]', style:{'text-background-color':'#3b2f0e','text-background-opacity':0.6,'text-background-padding':'1px'}},
    ],
    layout: LAYOUT_COSE
  });
  bindInteractions();
  updateProgress();
  applyStarredStyles();
  renderStarred();
}

/* 布局定义 */
const LAYER_ORDER = ['found','analysis','algebra','geom','prob','disc','app'];
const LAYOUT_COSE = {name:'cose', animate:false, nodeRepulsion:9000, idealEdgeLength:110, nodeOverlap:22, componentSpacing:90, padding:30, randomize:true, gravity:80, numIter:1000, fit:true};
function layoutLayered(){
  // 按 layer 分行：每个 layer 一行，节点在该行内排开
  const cy_ = cy;
  const nodes = cy_.nodes();
  const cols = {}; LAYER_ORDER.forEach((l,i)=>cols[l]=i);
  const byLayer = {};
  nodes.forEach(n=>{ const l=n.data('layer'); (byLayer[l]=byLayer[l]||[]).push(n); });
  const rowH = 180;
  nodes.positions(()=>({x:0,y:0})); // reset
  LAYER_ORDER.forEach((layer,row)=>{
    const arr = byLayer[layer]||[];
    const totalW = arr.length*160;
    arr.forEach((n,i)=>{
      n.position({x: -totalW/2 + i*160, y: -rowH*(LAYER_ORDER.length/2) + row*rowH});
    });
  });
  cy_.animate({fit:{eles:cy_.elements(), padding:40}, duration:400});
  cy_.ready(()=>{});
}
let currentLayout='cose';
function toggleLayout(){
  currentLayout = currentLayout==='cose'?'layered':'cose';
  if(currentLayout==='layered'){
    layoutLayered();
  } else {
    cy.layout(LAYOUT_COSE).run();
  }
  const btn = document.getElementById('layout-btn');
  if(btn) btn.textContent = currentLayout==='cose'?'📊 分层布局':'🌐 力导向布局';
}

/* 收藏样式应用（初始化时） */
function applyStarredStyles(){
  starred.forEach(id=>{ const el=cy.getElementById(id); if(el&&el.length) el.addClass('starred'); });
}

/* 绑定所有鼠标交互 */
function bindInteractions(){
  let fishTimer=null, lastFishNode=null;
  // 鱼眼：mouseover 放大该节点及直接邻居
  cy.on('mouseover','node', e=>{
    const id=e.target.id();
    document.getElementById('hint').innerHTML='<b>'+e.target.data('label')+'</b>：'+NODES[id].def;
    if(focusedNode) return; // 聚焦模式下不触发鱼眼
    clearTimeout(fishTimer);
    cy.nodes().removeClass('fish-big fish-mid');
    e.target.addClass('fish-big');
    const pr=getDirectPrereqs(id), nx=getDirectNexts(id);
    [...pr,...nx].forEach(p=>{ const el=cy.getElementById(p); if(el&&el.length) el.addClass('fish-mid'); });
    lastFishNode=id;
  });
  cy.on('mouseout','node', e=>{
    if(focusedNode) return;
    fishTimer=setTimeout(()=>{ cy.nodes().removeClass('fish-big fish-mid'); }, 200);
  });
  // 单击：聚焦
  cy.on('tap','node', e=>{ e.preventDefault(); focusNode(e.target.id()); });
  // 点空白退出聚焦
  cy.on('tap', e=>{ if(e.target===cy && focusedNode){ exitFocus(); } });
  // 双击：固定/解锁位置
  cy.on('dbltap','node', e=>{
    const n=e.target;
    n.toggleClass('pinned');
    n.grabify(); // 允许拖
    document.getElementById('hint').innerHTML='双击已'+(n.hasClass('pinned')?'<b>固定</b>该节点位置（可拖动）':'<b>释放</b>该节点');
  });
  // 默认所有节点可拖动（cytoscape 默认即可），pinned 只是视觉标记
  // 右键：收藏
  cy.on('cxttap','node', e=>{
    e.preventDefault();
    const id=e.target.id();
    toggleStar(id);
    document.getElementById('hint').innerHTML='已'+(starred.has(id)?'<b>收藏</b>':'取消收藏')+'：'+NODES[id].name;
  });
  // 禁用浏览器默认右键菜单
  document.getElementById('cy').addEventListener('contextmenu', e=>e.preventDefault());
  // 缩放时：动态调整字体大小，让放大后字更清楚
  cy.on('zoom', ()=>{ adjustFontSize(); });
  cy.on('pan', ()=>{});
  // ---- 恢复上次的视图状态（刷新后不丢失"我在看什么"）----
  // 延迟执行，等布局稳定
  setTimeout(()=>{
    const vs = loadViewState();
    console.log('[restore] viewState=', JSON.stringify(vs));
    if(!vs || (!vs.focused && !vs.path && (!vs.mode || vs.mode==='atlas'))){ console.log('[restore] 无可恢复状态，跳过'); return; }
    try{
      if(vs.mode && vs.mode!=='atlas' && vs.mode!==currentMode){ setMode(vs.mode); }
      if(vs.path && PATHS[vs.path]){ selectPath(vs.path); }
      if(vs.focused && NODES[vs.focused]){
        console.log('[restore] 恢复聚焦', vs.focused);
        focusNode(vs.focused);
        const hint = document.getElementById('hint');
        if(hint) hint.innerHTML = '↩️ 已恢复上次查看：<b>'+NODES[vs.focused].name+'</b>　<button class="mini-btn" onclick="exitFocus()">回全景图</button>';
      }else{ console.log('[restore] focused 无效:', vs.focused, 'NODES存在?', !!NODES[vs.focused]); }
    }catch(e){ console.warn('[restore] 恢复失败', e); }
  }, 600);
}
function adjustFontSize(){
  const z=cy.zoom();
  // zoom>1 放大字体，<1 保持最小可读
  const base = 10;
  const fs = Math.max(8, Math.min(20, base * Math.sqrt(z)));
  cy.style().selector('node').style('font-size', fs+'px').update();
}

/* ---- 聚焦交互：直接前后(1层不递归) + 当前目标路径上下文 ---- */
function getDirectPrereqs(id){ return (NODES[id].prereq||[]).filter(p=>NODES[p]); }
function getDirectNexts(id){ return Object.keys(NODES).filter(k=>(NODES[k].prereq||[]).includes(id)); }
// 递归版（仅全局视图用）
function getPrereqChain(id, depth, acc){
  acc = acc||new Set(); if(depth<=0) return acc;
  (NODES[id].prereq||[]).forEach(p=>{ if(NODES[p]){ acc.add(p); getPrereqChain(p, depth-1, acc); } });
  return acc;
}
function getNextChain(id, depth, acc){
  acc = acc||new Set(); if(depth<=0) return acc;
  Object.keys(NODES).forEach(k=>{ if((NODES[k].prereq||[]).includes(id)){ acc.add(k); getNextChain(k, depth-1, acc); } });
  return acc;
}

function focusNode(id){
  focusedNode = id; isGlobalView = false;
  saveViewState();  // 持久化：记住用户在看哪个节点
  cy.elements().removeClass('dim focused prereq-node next-node path-ctx link-edge prereq-edge next-edge');
  const prereqs = getDirectPrereqs(id);
  let nexts = getDirectNexts(id);
  // 目标上下文：如果当前在某路径上，高亮该节点在路径中的前后
  let ctxPre = [], ctxNext = [];
  if(currentPath && PATHS[currentPath]){
    const ids = PATHS[currentPath].steps.map(s=>s.id);
    const idx = ids.indexOf(id);
    if(idx>=0){ ctxPre = idx>0?[ids[idx-1]]:[]; ctxNext = idx<ids.length-1?[ids[idx+1]]:[]; }
  }
  const keep = new Set([id, ...prereqs, ...nexts, ...ctxPre, ...ctxNext]);
  cy.nodes().forEach(n=>{
    const nid=n.id();
    if(nid===id) n.removeClass('dim').addClass('focused');
    else if(prereqs.includes(nid) || ctxPre.includes(nid)) n.removeClass('dim').addClass(ctxPre.includes(nid)&&!prereqs.includes(nid)?'path-ctx':'prereq-node');
    else if(nexts.includes(nid) || ctxNext.includes(nid)) n.removeClass('dim').addClass(ctxNext.includes(nid)&&!nexts.includes(nid)?'path-ctx':'next-node');
    else n.addClass('dim');
  });
  cy.edges().forEach(e=>{
    const s=e.source().id(), t=e.target().id();
    if(!keep.has(s)||!keep.has(t)){ e.addClass('dim'); return; }
    e.removeClass('dim');
    // 按方向着色：前置→当前=青(prereq-edge)；当前→后续=橙(next-edge)；其余=灰(link-edge)
    if(prereqs.includes(s) && t===id) e.addClass('prereq-edge');
    else if(s===id && nexts.includes(t)) e.addClass('next-edge');
    else if(ctxPre.includes(s) && t===id) e.addClass('prereq-edge');
    else if(s===id && ctxNext.includes(t)) e.addClass('next-edge');
    else e.addClass('link-edge');
  });
  const visible = cy.elements().filter(el=>!el.hasClass('dim'));
  cy.animate({fit:{eles:visible, padding:70}, duration:400});
  const goals = goalsUsing(id);
  const status = nodeStatus(id);
  const statusText = status==='mastered'?'<span style="color:#22c55e">✓ 已掌握</span>':status==='recommended'?'<span style="color:#fbbf24">★ 推荐学习</span>':'<span style="color:#94a3b8">前置未全掌握（仍可学）</span>';
  document.getElementById('focusbar').classList.add('show');
  document.getElementById('focusbar').innerHTML =
    '<b>'+NODES[id].name+'</b>　'+statusText+
    (prereqs.length? '　<span style="color:#22d3ee">青=前置</span>':'')+
    (nexts.length? '　<span style="color:#fb923c">橙=后续</span>':'')+
    (currentPath&&ctxPre.length+ctxNext.length? '　<span style="color:#e879f9">品红=目标路径上下文</span>':'')+
    (goals.length? '<br>💡 学完能通往：'+goals.slice(0,4).join('、')+(goals.length>4?' 等':''):'')+
    '　<button class="mini-btn" onclick="toggleGlobalView()">🌍 展开完整链</button>'+
    '　<button class="mini-btn" onclick="exitFocus()">✕ 退出</button>';
  showDetail(id);
}

function toggleGlobalView(){
  if(!focusedNode) return;
  isGlobalView = !isGlobalView;
  if(isGlobalView){
    // 全景：递归取完整链，高亮，其余变暗（但仍可见，不彻底隐藏）
    cy.nodes().removeClass('dim focused prereq-node next-node');
    cy.edges().removeClass('dim link-edge prereq-edge next-edge');
    const allPre = getPrereqChain(focusedNode, 99);
    const allNext = getNextChain(focusedNode, 99);
    const chain = new Set([focusedNode, ...allPre, ...allNext]);
    cy.nodes().forEach(n=>{ if(!chain.has(n.id())) n.addClass('dim'); else if(n.id()===focusedNode) n.addClass('focused'); else if(allPre.has(n.id())) n.addClass('prereq-node'); else n.addClass('next-node'); });
    cy.edges().forEach(e=>{
      const s=e.source().id(), t=e.target().id();
      if(!chain.has(s)||!chain.has(t)){ e.addClass('dim'); return; }
      e.removeClass('dim');
      // 链视图也按方向着色：prereq 链上(指向当前或其前置)的边=青，next 链上(从当前或其后续指出)的边=橙
      if(allPre.has(s) && (t===focusedNode||allPre.has(t))) e.addClass('prereq-edge');
      else if((s===focusedNode||allNext.has(s)) && allNext.has(t)) e.addClass('next-edge');
      else e.addClass('link-edge');
    });
    cy.animate({fit:{eles:cy.elements(), padding:40}, duration:400});
  } else { focusNode(focusedNode); }
}

function exitFocus(){
  focusedNode=null; isGlobalView=false;
  clearViewState();  // 退出聚焦=回全景，清除视图状态
  cy.elements().removeClass('dim focused prereq-node next-node path-ctx link-edge prereq-edge next-edge');
  document.getElementById('focusbar').classList.remove('show');
  cy.animate({fit:{eles:cy.elements(), padding:30}, duration:400});
}

/* ---- 标记掌握 / 重置 ---- */
function toggleMastered(id){
  if(mastered.has(id)){ mastered.delete(id); autoMasterLock.delete(id); }
  else { mastered.add(id); autoMasterLock.add(id); }  // 手动标记=锁定，不会被知识点取消勾选自动移除
  saveMastered(); saveAutoMasterLock();
  // 更新所有节点状态显示
  cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); });
  updateProgress();
  if(focusedNode===id || (focusedNode && (getPrereqChain(focusedNode,99).has(id)||getNextChain(focusedNode,99).has(id)))){ focusNode(focusedNode); }
}
function resetAllProgress(){
  if(!confirm('确定清空所有学习进度（节点+知识点）？此操作不可撤销。')) return;
  mastered.clear(); saveMastered();
  masteredItems.clear(); saveMasteredItems();
  autoMasterLock.clear(); saveAutoMasterLock();
  cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); });
  updateProgress();
}
// ---- 进度备份（导出/导入），防 localStorage 被清理导致数据丢失 ----
function exportProgress(){
  const data = {
    version: 1, exported: new Date().toISOString(),
    mastered: [...mastered],
    masteredItems: [...masteredItems],
    autoMasterLock: [...autoMasterLock],
    starred: [...starred]
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'math-atlas-progress-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function importProgress(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data || typeof data !== 'object' || !Array.isArray(data.mastered)) throw new Error('文件格式不对');
      if(!confirm('将用备份文件覆盖当前进度，确定？')) { ev.target.value=''; return; }
      if(Array.isArray(data.mastered)){ mastered = new Set(data.mastered); saveMastered(); }
      if(Array.isArray(data.masteredItems)){ masteredItems = new Set(data.masteredItems); saveMasteredItems(); }
      if(Array.isArray(data.autoMasterLock)){ autoMasterLock = new Set(data.autoMasterLock); saveAutoMasterLock(); }
      if(Array.isArray(data.starred)){ starred = new Set(data.starred); saveStarred(); }
      cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); n.toggleClass('starred', starred.has(n.id())); });
      updateProgress(); renderStarred();
      alert('✅ 进度已恢复：'+mastered.size+' 个节点，'+masteredItems.size+' 个知识点');
    }catch(err){
      alert('❌ 导入失败：'+err.message+'\n请确认是 Math Atlas 导出的备份文件。');
    }
    ev.target.value='';
  };
  reader.readAsText(file);
}
function updateProgress(){
  const total = Object.keys(NODES).length;
  const done = mastered.size;
  // 知识点粒度统计
  let itemTotal = 0, itemDone = 0;
  for(const n of Object.values(NODES)){ itemTotal += (n.items||[]).length; }
  itemDone = masteredItems.size;
  const cntEl = document.getElementById('progress-count');
  if(cntEl) cntEl.textContent = done+' / '+total + ' · 知识点 '+itemDone+'/'+itemTotal;
  document.getElementById('progress-bar').style.width = (done/total*100)+'%';
}

function setMode(mode){
  currentMode = mode;
  saveViewState();  // 持久化模式
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.mode===mode));
  const sb = document.getElementById('sidebar');
  const pb = document.getElementById('pathbar');
  pb.classList.remove('show');
  exitFocus();
  if(mode==='atlas'){
    sb.classList.remove('show');
    document.getElementById('hint').innerHTML = '<b>金色边框=推荐起点</b>（前置已具备）· 绿色=已掌握 · 点击节点查看 · 聚焦后<span style="color:#22d3ee">青框=前置</span> <span style="color:#fb923c">橙框=后续</span>';
  } else if(mode==='goal'){
    renderGoalSidebar(); sb.classList.add('show');
    document.getElementById('hint').innerHTML = '左侧选择一个 <b>目标</b>，结合你的进度标出<b>缺口</b>（橙色）';
  } else if(mode==='search'){
    renderSearchSidebar(); sb.classList.add('show');
    document.getElementById('hint').innerHTML = '输入关键词搜索数学分支';
  }
}

function renderGoalSidebar(){
  const sb = document.getElementById('sidebar');
  const fields = {};
  Object.entries(PATHS).forEach(([id,p])=>{(fields[p.field]=fields[p.field]||[]).push([id,p]);});
  let html='';
  Object.entries(fields).forEach(([field, items])=>{
    html += '<div class="group"><div class="group-title">'+field+'</div>';
    items.forEach(([id,p])=>{
      const gap = p.steps.filter(s=>!mastered.has(s.id)).length;
      const tag = gap===0?'<span style="color:#22c55e">✓已完成</span>': gap<p.steps.length?'缺'+gap+'/'+p.steps.length : p.steps.length+'步';
      html += '<div class="item" onclick="selectPath(\''+id+'\', this)">'+p.name+'<div class="meta">'+tag+'</div></div>';
    });
    html += '</div>';
  });
  sb.innerHTML = html;
}

function selectPath(pathId, srcEl){
  currentPath = pathId;
  saveViewState();  // 持久化路径
  const p = PATHS[pathId];
  document.querySelectorAll('#sidebar .item').forEach(el=>el.classList.remove('active'));
  if(srcEl) srcEl.classList.add('active');
  exitFocus();
  const need = new Set(p.steps.map(s=>s.id));
  cy.nodes().forEach(n=>{
    const nid=n.id();
    if(!need.has(nid)) n.addClass('dim');
    else if(mastered.has(nid)) n.addClass('path-done');
    else n.addClass('path-gap');
  });
  cy.edges().forEach(e=>{ if(need.has(e.source().id())&&need.has(e.target().id())) e.addClass('path-edge'); else e.addClass('dim'); });
  const visible = cy.elements().filter(e=> need.has(e.id()) || (e.isEdge()&&need.has(e.source().id())&&need.has(e.target().id())));
  cy.animate({fit:{eles:visible, padding:60}, duration:400});
  const pb = document.getElementById('pathbar');
  pb.classList.add('show');
  const gaps = p.steps.filter(s=>!mastered.has(s.id));
  let pills = p.steps.map((s,i)=>{
    const done = mastered.has(s.id);
    return '<span class="pill'+(done?' done':' gap')+'" onclick="showDetail(\''+s.id+'\',\''+pathId+'\')">'+(done?'✓':(i+1))+'.'+NODES[s.id].name+'</span>';
  }).join('');
  pb.innerHTML = '<b>🎯 '+p.name+'</b>　'+p.summary+'<br>进度：'+(p.steps.length-gaps.length)+'/'+p.steps.length+'　<span style="color:#f97316">橙色=待学缺口，绿色=已掌握</span><br>'+pills;
}

function renderSearchSidebar(){
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div class="search-box"><input id="search-input" placeholder="搜索：微积分、线性代数、密码..." oninput="doSearch(this.value)"></div><div id="search-results"></div>';
  doSearch('');
}
function doSearch(q){
  q = q.trim().toLowerCase();
  const res = document.getElementById('search-results');
  let html='';
  Object.entries(NODES).forEach(([id,n])=>{
    const hay = (n.name+n.def+n.why).toLowerCase();
    if(!q || hay.includes(q)){
      const st = nodeStatus(id);
      const mark = st==='mastered'?'✓ ':st==='recommended'?'★ ':'';
      html += '<div class="item" onclick="focusNode(\''+id+'\')">'+mark+n.name+'<div class="meta">'+LAYERS[n.layer].name+'</div></div>';
    }
  });
  res.innerHTML = html || '<div class="item" style="cursor:default;color:var(--txt-dim)">无结果</div>';
}

function showDetail(id, pathId){
  const n = NODES[id]; if(!n) return;
  document.getElementById('d-dot').style.background = layerColor(id);
  document.getElementById('d-name').textContent = n.name;
  document.getElementById('d-layer').textContent = LAYERS[n.layer].name + (n.msc ? ' · '+n.msc : '');
  // 质量等级 qa 徽章（追加到标题）
  const QA_LABEL = {A:'A 权威背书',B:'B 已核对',C:'C 待校对',D:'D 存疑'};
  const QA_TIP = {A:'所有字段经权威来源（课标/MSC/经典教材）核对',B:'字段经维基/经典教材搜索核对',C:'部分字段待联网核对，请当心',D:'存在已知问题或无法溯源'};
  const qaBadge = n.qa ? '<span class="qa-badge qa-'+n.qa+'" title="'+(QA_TIP[n.qa]||'')+'">'+(QA_LABEL[n.qa]||n.qa)+'</span>' : '';
  if(qaBadge){ document.getElementById('d-name').innerHTML = n.name + qaBadge; }
  const status = nodeStatus(id);
  const isM = mastered.has(id);
  const goals = goalsUsing(id);
  const prereqHtml = (n.prereq||[]).length
    ? n.prereq.map(p=>{ const ok=mastered.has(p); return '<span class="pill'+(ok?' done':'')+'" onclick="focusNode(\''+p+'\')">'+(ok?'✓':'')+NODES[p].name+'</span>'; }).join('')
    : '<span style="color:var(--txt-dim)">无前置（起点节点）</span>';
  const leadsIds = Object.entries(NODES).filter(([_,m])=>(m.prereq||[]).includes(id)).map(([x])=>x);
  const leadsHtml = leadsIds.length ? leadsIds.map(p=>'<span class="pill" onclick="focusNode(\''+p+'\')">'+NODES[p].name+'</span>').join('') : '<span style="color:var(--txt-dim)">—</span>';
  const resHtml = (n.res||[]).map(r=>'<div class="res-item"><span class="tag">'+(r.k||'资源')+'·'+(r.lang||'')+'</span>'+(r.url?'<a href="'+r.url+'" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none">'+r.t+' 🔗</a>':r.t)+'</div>').join('') || '<span style="color:var(--txt-dim)">见相关节点</span>';
  // 知识点：item 兼容字符串（{t:it,d:''}）和对象（{t,d}）。点击：切换勾选+就地展开定义。
  const itemsHtml = (n.items&&n.items.length) ? (function(){
    const doneN = countItemsDone(id);
    return '<div class="section"><h3>包含的知识点 <span class="items-src">（'+doneN+'/'+n.items.length+' 已掌握'+(n.items_src?(' · 来源：'+n.items_src):'')+'）</span></h3>'+
      '<div class="items-grid">'+
      n.items.map(function(it,idx){
        const t = typeof it==='string' ? it : it.t;       // 兼容旧字符串
        const d = typeof it==='string' ? '' : (it.d||'');   // 一句话定义（B 批次填充）
        const key = id+'::'+idx;
        const done = masteredItems.has(key);
        const hasDef = d.length>0;
        // 主标签：点击展开/收起定义（toggleDesc）；勾选框单独控制掌握（toggleItem）
        const chkTitle = done ? '取消掌握' : '标记已掌握';
        return '<span class="kp-wrap">'+
          '<span class="kp'+(done?' kp-done':'')+'" data-kp="'+key+'" onclick="toggleDesc(\''+key+'\')">'+
            '<span class="kp-chk" title="'+chkTitle+'" onclick="event.stopPropagation();toggleItem(\''+id+'\','+idx+')">'+(done?'✓':'○')+'</span>'+
            '<span class="kp-text">'+t+'</span>'+
          '</span>'+
          (hasDef ? '<span class="kp-desc" data-desc="'+key+'">'+d+'</span>' : '')+
        '</span>';
      }).join('')+
      '</div></div>';
  })() : '';
  let depthHtml='';
  if(pathId && PATHS[pathId]){ const step=PATHS[pathId].steps.find(s=>s.id===id); if(step) depthHtml='<div class="depth-row"><span class="goal">🎯 '+PATHS[pathId].name+'</span><span>'+step.depth+'</span></div>'; }
  depthHtml += (n.depth||[]).map(d=>'<div class="depth-row"><span class="goal">'+d.g+'</span><span>'+d.d+'</span></div>').join('');
  const goalsHtml = goals.length ? '<div class="section"><h3>学完能通往这些目标</h3><p>'+goals.map(g=>'<span class="pill">'+g+'</span>').join('')+'</p></div>' : '';
  const statusLabel = status==='mastered'?'<span style="color:#22c55e">✓ 已掌握</span>':status==='recommended'?'<span style="color:#fbbf24">★ 推荐学习（前置已具备）</span>':'<span style="color:#94a3b8">前置未全掌握（仍可学习）</span>';
  document.getElementById('d-body').innerHTML =
    '<div class="section"><h3>当前状态</h3><p>'+statusLabel+'</p></div>'+
    '<div class="section"><h3>一句话定义</h3><p>'+n.def+'</p></div>'+
    itemsHtml+
    '<div class="section"><h3>它解决什么问题</h3><p>'+n.why+'</p></div>'+
    '<div class="section"><h3>前置依赖（先学这些）</h3><p>'+prereqHtml+'</p></div>'+
    '<div class="section"><h3>后续发展（学完能去哪）</h3><p>'+leadsHtml+'</p></div>'+
    goalsHtml+
    '<div class="section"><h3>学到什么程度算够</h3>'+(depthHtml||'<p style="color:var(--txt-dim)">参考具体目标路线</p>')+'</div>'+
    '<div class="section"><h3>推荐资源</h3>'+resHtml+'</div>'+
    '<div class="section"><button class="big-btn '+(isM?'done':'')+'" onclick="toggleMastered(\''+id+'\')">'+(isM?'✓ 已掌握（点击取消）':'标记为已掌握')+'</button></div>';
  document.getElementById('detail').classList.add('show');
}
function closeDetail(){ document.getElementById('detail').classList.remove('show'); }
function showError(msg){
  var box=document.createElement('div');
  box.style.cssText='display:flex;height:100%;align-items:center;justify-content:center;color:#f87171;font-size:13px;text-align:center;padding:20px;font-family:monospace;white-space:pre-wrap';
  box.textContent=msg;
  var c=document.getElementById('cy'); c.innerHTML=''; c.appendChild(box);
}

// 初始化（防重复 + 错误兜底）
let _inited=false;
function safeInit(){
  if(_inited) return; _inited=true;
  if(typeof cytoscape==='undefined'){ showError('⚠️ Cytoscape 库未加载。'); return; }
  try{ initCytoscape(); }
  catch(e){ console.error(e); showError('初始化错误: '+(e.message||e)+'\n\n'+(e.stack||'')); }
}
window.addEventListener('DOMContentLoaded', safeInit);
if(document.readyState!=='loading') safeInit();
</script>
