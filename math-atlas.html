<!DOCTYPE html>
<html lang="zh-CN">
<!--
  数学导航地图 · Math Atlas
  基础层的人教版知识点清单(items)整理自 mewamew/math-atlas (MIT License, https://github.com/mewamew/math-atlas)
  在此基础上整合为图谱+导航形式。感谢原作者的知识梳理工作。
  本项目同样以 MIT 许可证开源。
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数学导航地图 · Math Atlas</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>

	<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>数学导航地图 <span class="sub">Math Atlas · 先有图，再有路</span></h1>
    <div class="tabs">
      <button class="tab active" data-mode="atlas" onclick="setMode('atlas')">🗺️ 全景图</button>
      <button class="tab" data-mode="goal" onclick="setMode('goal')">🎯 目标路线</button>
      <button class="tab" data-mode="search" onclick="setMode('search')">🔍 搜索</button>
      <button class="tab" onclick="openDiagnostic()" title="不知道从哪学？先做诊断" style="background:var(--accent);color:#0f172a;border-color:var(--accent);font-weight:600">📋 诊断</button>
    </div>
    <div class="progress-wrap" title="已掌握的节点数">
      <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
      <span class="progress-label">✓ <span id="progress-count">0 / 96</span></span>
      <button class="reset-btn" onclick="exportProgress()" title="备份进度（导出文件）">⬇</button>
      <label class="reset-btn" title="恢复进度（导入文件）" style="cursor:pointer;margin:0">⬆<input type="file" id="import-file" accept=".json" style="display:none" onchange="importProgress(event)"></label>
      <button class="reset-btn" onclick="resetAllProgress()" title="清空进度">↺</button>
    </div>
    <button class="tab" id="layout-btn" onclick="toggleLayout()" style="margin-left:4px" title="切换布局">📊 分层布局</button>
  </header>
	  <main>
	    <aside id="sidebar"></aside>
	    <div id="cy-wrap">
	      <div id="starred-panel" class="starred-panel">
	        <div class="starred-head">⭐ 我的收藏 <span class="starred-hint">右键节点收藏</span></div>
	        <div id="starred-list" class="starred-list"></div>
	      </div>
	      <div id="cy"></div>
      <div class="hint" id="hint">点击任意节点查看详情 · 滚轮缩放 · 拖拽平移</div>
      <div id="focusbar" class="focusbar"></div>
      <div class="legend">
        <div class="row"><span class="dot" style="background:var(--c-found)"></span>基础层</div>
        <div class="row"><span class="dot" style="background:var(--c-analysis)"></span>分析</div>
        <div class="row"><span class="dot" style="background:var(--c-algebra)"></span>代数</div>
        <div class="row"><span class="dot" style="background:var(--c-geom)"></span>几何与拓扑</div>
        <div class="row"><span class="dot" style="background:var(--c-prob)"></span>概率与统计</div>
        <div class="row"><span class="dot" style="background:var(--c-disc)"></span>离散数学</div>
        <div class="row"><span class="dot" style="background:var(--c-app)"></span>应用与计算</div>
        <div class="row" style="margin-top:4px;padding-top:5px;border-top:1px solid var(--panel2);color:var(--txt-dim)">聚焦时连线：</div>
        <div class="row"><span style="width:18px;height:3px;background:#22d3ee;border-radius:2px"></span>青线=前置</div>
        <div class="row"><span style="width:18px;height:3px;background:#fb923c;border-radius:2px"></span>橙线=后续</div>
      </div>
    </div>
    <div id="detail">
      <div class="dhead">
        <div class="dot" id="d-dot"></div>
        <div><h2 id="d-name"></h2><div class="layer" id="d-layer"></div></div>
        <button class="dclose" onclick="closeDetail()">✕</button>
      </div>
      <div class="dbody" id="d-body"></div>
    </div>
  </main>
  <div id="pathbar"></div>
</div>

<!-- 诊断问卷模态框 -->
<div id="diag-modal" style="position:fixed;inset:0;background:rgba(8,12,22,.7);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:100;display:none;align-items:center;justify-content:center">
  <div style="background:#162032;border:1px solid #2a3a52;box-shadow:0 20px 60px rgba(0,0,0,.5);border-radius:16px;width:720px;max-width:94vw;max-height:88vh;overflow-y:auto;padding:0">
    <div style="padding:24px 28px 8px;display:flex;align-items:center;gap:12px">
      <div style="width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#38bdf8,#0ea5e9);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0">📋</div>
      <div>
        <h2 style="font-size:19px;font-weight:600;letter-spacing:.2px">学习诊断</h2>
        <p style="color:var(--txt-dim);font-size:12px;margin-top:2px">回答三个问题，自动标记基础并推荐起点</p>
      </div>
      <button onclick="closeDiagnostic()" style="margin-left:auto;background:#243349;border:none;color:var(--txt-dim);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:15px;flex-shrink:0">✕</button>
    </div>

    <div style="padding:8px 28px 24px">
      <!-- Q1: 数学背景 -->
      <div class="diag-card">
        <div class="diag-card-h"><span class="diag-num">1</span><span>你的数学背景？</span><span class="diag-card-sub">选后自动预填已掌握知识</span></div>
        <div id="diag-bg" class="diag-chips">
          <button class="diag-chip" data-bg="middle" onclick="diagPickBg('middle')">初中水平</button>
          <button class="diag-chip" data-bg="high" onclick="diagPickBg('high')">高中学过</button>
          <button class="diag-chip" data-bg="eng" onclick="diagPickBg('eng')">大学工科</button>
          <button class="diag-chip" data-bg="sci" onclick="diagPickBg('sci')">大学理科</button>
          <button class="diag-chip" data-bg="math" onclick="diagPickBg('math')">数学专业</button>
        </div>
      </div>

      <!-- Q2: 学习目标 -->
      <div class="diag-card">
        <div class="diag-card-h"><span class="diag-num">2</span><span>你的学习目标？</span><span class="diag-card-sub">可选，用于推荐路线</span></div>
        <div id="diag-goal" class="diag-goal-grid"></div>
      </div>

      <!-- Q3: 自评已掌握 -->
      <div class="diag-card">
        <div class="diag-card-h"><span class="diag-num">3</span><span>已掌握的基础知识</span><span class="diag-toggle" onclick="diagToggleAllSkills()">全选/取消</span></div>
        <div id="diag-skills" class="diag-skills-grid"></div>
        <p style="font-size:11px;color:var(--txt-dim);margin-top:8px">勾选会同步到"已掌握"进度。不勾不勉强——后续学了再点节点标记也行。</p>
      </div>

      <button onclick="diagGenerate()" class="diag-go">生成诊断报告 →</button>
      <div id="diag-result" style="margin-top:16px;display:none"></div>
    </div>
  </div>
</div>
<style>
.diag-card{background:#1a2740;border:1px solid #283a55;border-radius:12px;padding:16px 18px;margin-bottom:14px}
.diag-card-h{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.diag-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#0b1220;font-size:13px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.diag-card-h>span:nth-child(2){font-size:15px;font-weight:600;color:var(--txt)}
.diag-card-sub{font-size:12px;color:var(--txt-dim);font-weight:400;margin-left:4px}
.diag-toggle{font-size:12px;color:var(--accent);cursor:pointer;margin-left:auto;font-weight:500}
.diag-toggle:hover{text-decoration:underline}
.diag-chips{display:flex;flex-wrap:wrap;gap:8px}
.diag-chip{background:#243349;border:1px solid #2f4361;color:var(--txt);padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer;transition:all .15s}
.diag-chip:hover{border-color:var(--accent);color:#fff}
.diag-chip.active{background:var(--accent);color:#0b1220;border-color:var(--accent);font-weight:600}
.diag-goal-grid{display:flex;flex-direction:column;gap:12px}
.diag-goal-group{}
.diag-goal-group-title{font-size:11px;color:var(--txt-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;font-weight:600}
.diag-goal-items{display:flex;flex-wrap:wrap;gap:6px}
.diag-goal-item{background:#243349;border:1px solid #2f4361;color:var(--txt);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;transition:all .15s}
.diag-goal-item:hover{border-color:var(--accent)}
.diag-goal-item.active{background:rgba(251,191,36,.18);border-color:#fbbf24;color:#fcd34d}
.diag-skills-grid{display:flex;flex-wrap:wrap;gap:6px}
.diag-skill{background:#243349;border:1px solid #2f4361;color:var(--txt);padding:5px 11px;border-radius:6px;font-size:12px;cursor:pointer;user-select:none;transition:all .15s}
.diag-skill:hover{border-color:var(--accent)}
.diag-skill.active{background:rgba(34,197,94,.18);border-color:#22c55e;color:#86efac}
.diag-go{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#0ea5e9);color:#0b1220;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;letter-spacing:.3px;transition:filter .15s;box-shadow:0 4px 14px rgba(56,189,248,.25)}
.diag-go:hover{filter:brightness(1.1)}
</style>
<script>
/* ========== 数据层：NODES / PATHS ========== */
const LAYERS = {
  found:   {name:'基础层',     color:'#6b7280'},
  analysis:{name:'分析',       color:'#2563eb'},
  algebra: {name:'代数',       color:'#dc2626'},
  geom:    {name:'几何与拓扑', color:'#059669'},
  prob:    {name:'概率与统计', color:'#7c3aed'},
  disc:    {name:'离散数学',   color:'#d97706'},
  app:     {name:'应用与计算', color:'#0891b2'},
};
// 各层图标（节点名前缀，提升视觉辨识度）
const LAYER_ICON = {found:'📐', analysis:'∑', algebra:'𝑥', geom:'△', prob:'🎲', disc:'◊', app:'⚙'};

/* 节点字段说明:
   id: 唯一标识
   name: 名称
   def: 一句话定义
   why: 它解决什么问题（动机）——成人化、目标导向
   prereq: 前置依赖 [id...]
   leads: 后续发展方向 [id...]  (仅作展示，图中的边由 prereq 生成)
   res: 资源 [{t:书名/课程, k:'书'|'课'|'视频', lang:'中'|'英'}]
   depth: 对常见目标"学到什么程度算够" [{g:目标, d:深度描述}]
   layer: 所属层级
*/
const NODES = {

  /* ============ 基础层（初高中数学骨架重建） ============ */
  number:    {layer:'found', name:'数与式',
    def:'整数、分数、实数、复数，以及它们的运算与代数式化简。',
    why:'这是所有数学的"字母表"。后续微积分里的极限、线性代数里的系数、概率里的期望，本质上都是在对这些数做运算。很多大学数学"看不懂"，其实卡在因式分解、指数对数运算不熟。',
    prereq:[], leads:['function','poly'],
    msc:'MSC2020 00A06（初等数学）',
    items:[{t:'正数和负数',d:'大于零的数为正数，小于零的数为负数，零既不是正数也不是负数。'},{t:'有理数的概念',d:'能表示为两个整数之比（分数）的数，包括整数和分数。'},{t:'有理数的分类',d:'按符号分为正有理数、零、负有理数；按整数性分为整数和分数。'},{t:'数轴',d:'规定了原点、正方向和单位长度的直线，用来直观表示数的大小。'},{t:'相反数',d:'只有符号不同的两个数互为相反数，它们的和为零。'},{t:'绝对值',d:'数轴上表示数的点到原点的距离，非负数 |a|≥0。'},{t:'有理数大小比较',d:'数轴上右边的点表示的数大于左边；正数＞0＞负数。'},{t:'有理数加减乘除',d:'先定符号再算绝对值；同号相加取同号，异号相加取绝对值大者的符号。'},{t:'有理数乘方',d:'求 n 个相同因数乘积的运算 aⁿ，a 是底数，n 是指数。'},{t:'有理数混合运算',d:'先乘方，再乘除，最后加减；有括号先算括号内。'},{t:'科学记数法',d:'把一个数写成 a×10ⁿ（1≤|a|＜10）的形式，便于表示很大或很小的数。'},{t:'近似数',d:'与实际数值接近但不完全相等的数，通过四舍五入等方法得到。'},{t:'有效数字',d:'从左边第一个非零数字起到末位数字止的所有数字。'},{t:'平方根',d:'若 x²=a，则 x 是 a 的平方根；正数有两个互为相反数的平方根。'},{t:'算术平方根',d:'正数 a 的正的平方根，记作 √a；零的算术平方根是零。'},{t:'立方根',d:'若 x³=a，则 x 是 a 的立方根 ∛a；每个实数都有唯一立方根。'},{t:'无理数',d:'不能表示为两个整数之比的数，即无限不循环小数（如 √2、π）。'},{t:'实数的概念',d:'有理数和无理数统称实数，与数轴上的点一一对应。'},{t:'实数与数轴',d:'每个实数都对应数轴上唯一一点，反之亦然，建立了数与形的桥梁。'},{t:'实数运算',d:'实数可进行加、减、乘、除（除数不为零）、乘方、开方运算。'},{t:'二次根式的概念与性质',d:'形如 √a（a≥0）的式子，满足 (√a)²=a、√(a²)=|a|。'},{t:'最简二次根式',d:'被开方数不含能开尽方的因数且不含分母的二次根式。'},{t:'二次根式四则运算',d:'加减先化简再合并同类二次根式；乘除用 √a·√b=√(ab)、√a/√b=√(a/b)。'},{t:'用字母表示数',d:'用字母代替具体数字，使运算关系具有一般性。'},{t:'代数式',d:'用基本运算符号连接数与字母的式子（如 2x+3）。'},{t:'代数式的值',d:'用具体数值代替代数式里的字母，按运算符号计算所得的结果。'},{t:'单项式与多项式',d:'单项式是数与字母的积，多项式是几个单项式的和。'},{t:'整式',d:'单项式和多项式统称整式，分母中不含字母。'},{t:'同类项与合并同类项',d:'所含字母相同且相同字母指数也相同的项；系数相加合并。'},{t:'整式加减',d:'去括号后合并同类项，注意括号前是负号时各项变号。'},{t:'幂的运算性质',d:'aᵐ·aⁿ=aᵐ⁺ⁿ、(aᵐ)ⁿ=aᵐⁿ、(ab)ⁿ=aⁿbⁿ，幂运算的基础。'},{t:'整式乘法',d:'单项式乘单项式、单项式乘多项式、多项式乘多项式（分配律）。'},{t:'乘法公式（平方差、完全平方）',d:'(a+b)(a-b)=a²-b²、(a±b)²=a²±2ab+b²。'},{t:'因式分解（提公因式、公式法）',d:'把多项式化为几个整式乘积的形式，是乘法的逆运算。'},{t:'分式的概念',d:'分母中含有字母的有理式（如 1/x），分母不能为零。'},{t:'分式基本性质',d:'分子分母同乘（或除以）同一个不为零的整式，分式值不变。'},{t:'分式四则运算',d:'通分后加减、约分后乘除，关键是找最简公分母。'},{t:'分式化简求值',d:'先约分化简，再代入数值计算，注意字母取值使分式有意义。'}],
    items_src:'人教版初高中数学教材（整理自 mewamew/math-atlas）',
    res:[{t:'《初等数学复习及研究（赵慈庚）》',k:'书',lang:'中'},{t:'Khan Academy: Arithmetic & Pre-algebra',k:'课',lang:'英',url:'https://www.khanacademy.org/math/pre-algebra'}],
    depth:[{g:'任何方向',d:'熟练：因式分解、指数对数运算法则、分式化简。这些不会，后面处处卡壳。'}],
    qa:'A'},

  function:  {layer:'found', name:'函数与图',
    def:'描述一个量如何随另一个量变化的关系，并用坐标系画出来。',
    why:'函数是现代数学的"主语"——微积分研究函数的变化率，机器学习模型本身就是函数。理解"输入→输出"的映射、看懂函数图像的升降凹凸，是后续一切的基础。',
    prereq:['number','setlogic'], leads:['calculus1','trig'],
    msc:'MSC2020 00A06（初等数学；函数概念属基础）',
    items:[{t:'常量与变量',d:'在某一过程中保持固定不变的量为常量，可以取不同数值的量为变量。'},{t:'函数的概念',d:'在一个变化过程中，有两个变量 x 和 y，若对 x 的每个值，y 都有唯一确定的值与之对应，则 y 是 x 的函数。'},{t:'自变量与因变量',d:'主动变化的量叫自变量（x），随之被动变化的量叫因变量（y）。'},{t:'函数值',d:'当自变量 x 取某值时，函数 y 对应的值，记作 f(a)。'},{t:'函数表示法（解析式/列表/图象）',d:'函数可用数学式子（解析法）、表格（列表法）、图象（图象法）三种方式表示。'},{t:'平面直角坐标系',d:'由两条互相垂直、原点重合的数轴组成，用有序数对确定点的位置。'},{t:'象限与点的坐标',d:'两坐标轴把平面分成四部分叫象限，点的位置用 (x,y) 表示。'},{t:'关于坐标轴/原点对称的点',d:'关于 x 轴对称则纵坐标相反，关于 y 轴对称则横坐标相反，关于原点对称则两坐标都相反。'},{t:'正比例函数及图象',d:'形如 y=kx（k≠0）的函数，图象是过原点的直线。'},{t:'一次函数及图象性质',d:'形如 y=kx+b（k≠0）的函数，图象是直线，k 决定倾斜方向。'},{t:'待定系数法求解析式',d:'已知函数图象上几点，设出待定系数的解析式，代入点坐标求出系数。'},{t:'一次函数与方程/不等式的关系',d:'一次函数图象与 x 轴交点的横坐标即对应方程的解，图象在轴上方对应不等式的解集。'},{t:'反比例函数及图象',d:'形如 y=k/x（k≠0）的函数，图象是双曲线，不过原点。'},{t:'二次函数的概念',d:'形如 y=ax²+bx+c（a≠0）的函数，图象是抛物线。'},{t:'二次函数 y=ax²/bx+c',d:'研究二次函数的系数 a、b、c 对图象形状和位置的影响。'},{t:'抛物线的开口/对称轴/顶点',d:'a 决定开口方向（a>0 上，a<0 下），对称轴 x=-b/(2a)，顶点 (-b/2a, (4ac-b²)/4a)。'},{t:'二次函数的最值',d:'当 a>0 时顶点是最小值，a<0 时顶点是最大值。'},{t:'二次函数与一元二次方程',d:'抛物线与 x 轴交点的横坐标即方程 ax²+bx+c=0 的根。'},{t:'二次函数实际应用',d:'用二次函数建模求最值问题（如利润最大化、面积最大化）。'}],
    items_src:'人教版初高中数学教材（整理自 mewamew/math-atlas）',
    res:[{t:'3Blue1Brown《函数图像可视化》',k:'视频',lang:'英'},{t:'《普林斯顿微积分读本》前2章',k:'书',lang:'英'},{t:'免费在线资源',k:'书',lang:'英',url:'https://www.3blue1brown.com/topics/calculus'}],
    depth:[{g:'任何方向',d:'看到常见函数（幂、指数、对数、三角）能秒想出图像形状。'}],
    qa:'A'},

  equation:  {layer:'found', name:'方程与不等式',
    def:'求解未知数满足的条件，包括等式和大小关系。',
    why:'解方程是数学最古老的任务。优化（找最大最小）、机器学习（解参数让误差最小）、控制（让系统满足某条件）本质都是解方程或不等式。',
    prereq:['number','function'], leads:['linalg','opt'],
    msc:'MSC2020 00A06',

// masteredItems: 知识点粒度的掌握集合，元素编码 `${nodeId}::${idx}`
let masteredItems = loadMasteredItems();
function loadMasteredItems(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_mastered_items')||'[]')); }
  catch(e){ return new Set(); }
}
function saveMasteredItems(){ localStorage.setItem('mathatlas_mastered_items', JSON.stringify([...masteredItems])); }
// 某节点的知识点是否全部勾选
function allItemsDone(id){
  const its = NODES[id].items||[];
  if(its.length===0) return false;
  return its.every((_,i)=>masteredItems.has(id+'::'+i));
}
// 某节点已勾选的知识点数
function countItemsDone(id){
  const its = NODES[id].items||[];
  return its.filter((_,i)=>masteredItems.has(id+'::'+i)).length;
}
// 展开/收起某个知识点的定义（就地展开）
function toggleDesc(key){
  const desc = document.querySelector('.kp-desc[data-desc="'+key+'"]');
  if(desc){
    const open = desc.style.display === 'block';
    desc.style.display = open ? 'none' : 'block';
    // 展开时让对应的 kp 标签高亮
    const kp = document.querySelector('.kp[data-kp="'+key+'"]');
    if(kp) kp.classList.toggle('kp-open', !open);
  }
}
// 切换某个知识点的掌握状态，并联动节点掌握（全勾⇒自动掌握，取消则解除）
function toggleItem(nodeId, idx){
  const key = nodeId+'::'+idx;
  if(masteredItems.has(key)) masteredItems.delete(key); else masteredItems.add(key);
  saveMasteredItems();
  // 联动：全勾则掌握节点；否则若之前因全勾而掌握（非手动锁定），现在解除
  const wasMastered = mastered.has(nodeId);
  if(allItemsDone(nodeId)){ mastered.add(nodeId); saveMastered(); }
  else if(wasMastered && !autoMasterLock.has(nodeId)){ mastered.delete(nodeId); saveMastered(); }
  // 局部更新：只刷新被点击的知识点样式 + 底部掌握按钮，不重渲染整个面板（避免跳动）
  const kp = document.querySelector('.kp[data-kp="'+nodeId+'::'+idx+'"]');
  if(kp){
    const done = masteredItems.has(key);
    kp.classList.toggle('kp-done', done);
    kp.setAttribute('data-done', done?'1':'0');
    const chkEl = kp.querySelector('.kp-chk');
    if(chkEl) chkEl.textContent = done ? '✓' : '○';
  }
  // 更新掌握按钮文字（全勾时变"已掌握"）
  const wasAuto = allItemsDone(nodeId);
  const btn = document.querySelector('.big-btn');
  if(btn){ btn.classList.toggle('done', mastered.has(nodeId)||wasAuto); btn.textContent = (mastered.has(nodeId)||wasAuto)?'✓ 已掌握（点击取消）':'标记为已掌握'; }
  // 更新标题里的 "X/Y 已掌握" 计数
  const srcEl = document.querySelector('.items-src');
  if(srcEl){ const dn=countItemsDone(nodeId), tot=(NODES[nodeId].items||[]).length; srcEl.textContent = '（'+dn+'/'+tot+' 已掌握'+(NODES[nodeId].items_src?(' · 来源：'+NODES[nodeId].items_src):'')+'）'; }
  cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); });
  updateProgress();
}
// autoMasterLock: 用户手动标记掌握的节点（不经知识点勾选），解除时不应被自动删除
let autoMasterLock = loadAutoMasterLock();
function loadAutoMasterLock(){
  try{ return new Set(JSON.parse(localStorage.getItem('mathatlas_autolock')||'[]')); }
  catch(e){ return new Set(); }
}
function saveAutoMasterLock(){ localStorage.setItem('mathatlas_autolock', JSON.stringify([...autoMasterLock])); }
// 推荐状态：前置全部已掌握 => 'recommended'；否则 'pending'。不设锁，所有节点可点。
function nodeStatus(id){
  if(!NODES[id]) return 'pending';  // 防御性：未知节点按 pending 处理
  if(mastered.has(id)) return 'mastered';
  const pr = NODES[id].prereq||[];
  if(pr.length===0 || pr.every(p=>mastered.has(p))) return 'recommended';
  return 'pending';
}
// 反查：哪些目标路径包含某节点（用于"学完能解锁什么"）
function goalsUsing(id){
  return Object.entries(PATHS).filter(([_,p])=>p.steps.some(s=>s.id===id)).map(([k,p])=>p.name);
}

function buildElements(){
  const nodes = Object.entries(NODES).map(([id,n])=>({
    data:{id, label:(LAYER_ICON[n.layer]||'')+' '+n.name, layer:n.layer, type:'subject', color:layerColor(id), status:nodeStatus(id), qa:n.qa}
  }));
  const edges = [];
  Object.entries(NODES).forEach(([id,n])=>{(n.prereq||[]).forEach(p=>{if(NODES[p]) edges.push({data:{source:p,target:id}});});});
  return [...nodes, ...edges];
}

/* 布局定义 */
const LAYER_ORDER = ['found','analysis','algebra','geom','prob','disc','app'];
const LAYOUT_COSE = {name:'cose', animate:false, nodeRepulsion:12000, idealEdgeLength:120, nodeOverlap:10, componentSpacing:100, padding:30, randomize:false, gravity:30, numIter:2000, fit:true};
function layoutLayered(){
  // 按 layer 分行：每个 layer 一行（节点多时自动换行），节点在该行内排开
  const cy_ = cy;
  const nodes = cy_.nodes();
  const byLayer = {};
  nodes.forEach(n=>{ const l=n.data('layer'); (byLayer[l]=byLayer[l]||[]).push(n); });
  const rowH = 155;       // 层间距
  const colW = 165;       // 固定列宽
  const maxPerRow = 10;   // 每行最多节点数，超过则换行
  const fixedRowW = maxPerRow * colW; // 所有行统一宽度，保证左右边沿对齐
  nodes.positions(()=>({x:0,y:0})); // reset
  let maxY = 0;
  LAYER_ORDER.forEach((layer,layerIdx)=>{
    const arr = byLayer[layer]||[];
    if(!arr.length) return;
    const rows = Math.ceil(arr.length / maxPerRow);
    arr.forEach((n,i)=>{
      const subRow = Math.floor(i / maxPerRow);
      const subCol = i % maxPerRow;
      const x = -fixedRowW/2 + subCol*colW + colW/2;
      const y = -rowH*(LAYER_ORDER.length/2) + (layerIdx + subRow*0.55) * rowH;
      n.position({x, y});
    });
    maxY = Math.max(maxY, layerIdx + (rows-1)*0.55);
  });
  // 初始布局瞬间定位，不带动效
  refit(cy_.elements(), FIT_PADDING_OVERVIEW, 0);
}
let currentLayout='cose';
function toggleLayout(){
  currentLayout = currentLayout==='cose'?'layered':'cose';
  if(currentLayout==='layered'){
    layoutLayered();
  } else {
    cy.layout(LAYOUT_COSE).run();
  }
  if(focusedNode){ setTimeout(()=>focusNode(focusedNode),500); }
  const btn = document.getElementById('layout-btn');
  if(btn) btn.textContent = currentLayout==='cose'?'📊 分层布局':'🌐 力导向布局';
}

/* 绑定所有鼠标交互 */
function bindInteractions(){
  let fishTimer=null, lastFishNode=null;
  // 鱼眼：mouseover 放大该节点及直接邻居（聚焦时也保留，方便预览其他节点）
  cy.on('mouseover','node', e=>{
    const id=e.target.id();
    if(NODES[id]){
      document.getElementById('hint').innerHTML='<b>'+e.target.data('label')+'</b>：'+NODES[id].def;
    }
    clearTimeout(fishTimer);
    cy.nodes().removeClass('fish-big fish-mid');
    e.target.addClass('fish-big');
    const pr=getDirectPrereqs(id), nx=getDirectNexts(id);
    [...pr,...nx].forEach(p=>{ const el=cy.getElementById(p); if(el&&el.length) el.addClass('fish-mid'); });
    lastFishNode=id;
  });
  cy.on('mouseout','node', e=>{
    fishTimer=setTimeout(()=>{ cy.nodes().removeClass('fish-big fish-mid'); }, 200);
  });
  // 单击：聚焦节点
	  cy.on('tap','node', e=>{
	    e.preventDefault();
	    const nid = e.target.id();
	    // 目标节点（星形）走 selectPath，不走 focusNode
	    if(e.target.data('type')==='goal'){ selectPath(e.target.data('goalKey')); return; }
	    focusNode(nid);
	  });
  // 点空白退出聚焦
  cy.on('tap', e=>{ if(e.target===cy && focusedNode){ exitFocus(); } });
  // 双击：固定/解锁位置
  cy.on('dbltap','node', e=>{
    const n=e.target;
    n.toggleClass('pinned');
    n.grabify(); // 允许拖
    document.getElementById('hint').innerHTML='双击已'+(n.hasClass('pinned')?'<b>固定</b>该节点位置（可拖动）':'<b>释放</b>该节点');
  });
  // 默认所有节点可拖动（cytoscape 默认即可），pinned 只是视觉标记
  // 右键：收藏
  cy.on('cxttap','node', e=>{
    e.preventDefault();
    const id=e.target.id();
    toggleStar(id);
    document.getElementById('hint').innerHTML='已'+(starred.has(id)?'<b>收藏</b>':'取消收藏')+'：'+NODES[id].name;
  });
  // 禁用浏览器默认右键菜单
  document.getElementById('cy').addEventListener('contextmenu', e=>e.preventDefault());
  // 缩放时不再动态改字号（旧方案让节点随缩放抖动）。改用 min-zoomed-font-size：缩太小时标签自动隐藏。
  cy.on('pan', ()=>{});
  // ---- 恢复上次的视图状态（刷新后不丢失"我在看什么"）----
  // 延迟执行，等布局稳定
  setTimeout(()=>{
    const vs = loadViewState();
    console.log('[restore] viewState=', JSON.stringify(vs));
    if(!vs || (!vs.focused && !vs.path && (!vs.mode || vs.mode==='atlas'))){ console.log('[restore] 无可恢复状态，跳过'); return; }
    try{
      if(vs.mode && vs.mode!=='atlas' && vs.mode!==currentMode){ setMode(vs.mode); }
      if(vs.path && PATHS[vs.path]){ selectPath(vs.path); }
      if(vs.focused && NODES[vs.focused]){
        console.log('[restore] 恢复聚焦', vs.focused);
        focusNode(vs.focused);
        const hint = document.getElementById('hint');
        if(hint) hint.innerHTML = '↩️ 已恢复上次查看：<b>'+NODES[vs.focused].name+'</b>　<button class="mini-btn" onclick="exitFocus()">回全景图</button>';
      }else{ console.log('[restore] focused 无效:', vs.focused, 'NODES存在?', !!NODES[vs.focused]); }
    }catch(e){ console.warn('[restore] 恢复失败', e); }
  }, 600);
}
/* ---- 统一的 fit 辅助：先 resize 同步画布尺寸，再 fit ---- */
const FIT_PADDING_FOCUS = 60;   // 聚焦子图时的边距
const FIT_PADDING_OVERVIEW = 25; // 全景/路径总览时的边距（收紧让节点更大、文字更可读）
function refit(eles, padding, duration){
  if(typeof cy === 'undefined' || !cy || !cy.nodes) return;
  cy.resize();
  const dur = (duration != null) ? duration : 400;
  if(dur <= 0){ cy.fit(eles||cy.elements(), padding!=null?padding:FIT_PADDING_OVERVIEW); return; }
  cy.animate({fit:{eles: eles||cy.elements(), padding: padding!=null?padding:FIT_PADDING_OVERVIEW}, duration: dur});
}
// 窗口缩放时防抖 resize
let _resizeTimer = null;
window.addEventListener('resize', ()=>{
  clearTimeout(_resizeTimer);
  _resizeTimer = setTimeout(()=>{ if(typeof cy!=='undefined' && cy && cy.nodes){ cy.resize(); } }, 150);
});

/* ---- 聚焦交互：直接前后(1层不递归) + 当前目标路径上下文 ---- */
function getDirectPrereqs(id){ return (NODES[id].prereq||[]).filter(p=>NODES[p]); }
function getDirectNexts(id){ return Object.keys(NODES).filter(k=>(NODES[k].prereq||[]).includes(id)); }
// 递归版（仅全局视图用）
function getPrereqChain(id, depth, acc){
  acc = acc||new Set(); if(depth<=0) return acc;
  (NODES[id].prereq||[]).forEach(p=>{ if(NODES[p]){ acc.add(p); getPrereqChain(p, depth-1, acc); } });
  return acc;
}
function getNextChain(id, depth, acc){
  acc = acc||new Set(); if(depth<=0) return acc;
  Object.keys(NODES).forEach(k=>{ if((NODES[k].prereq||[]).includes(id)){ acc.add(k); getNextChain(k, depth-1, acc); } });
  return acc;
}

function focusNode(id){
  if(!NODES[id]) return;  // 目标节点不走聚焦（由 selectPath 处理）
  focusedNode = id; isGlobalView = false;
  saveViewState();  // 持久化：记住用户在看哪个节点
  cy.elements().removeClass('dim focused prereq-node next-node path-ctx link-edge prereq-edge next-edge fish-big fish-mid');
  const prereqs = getDirectPrereqs(id);
  let nexts = getDirectNexts(id);
  // 目标上下文：如果当前在某路径上，高亮该节点在路径中的前后
  let ctxPre = [], ctxNext = [];
  if(currentPath && PATHS[currentPath]){
    const ids = PATHS[currentPath].steps.map(s=>s.id);
    const idx = ids.indexOf(id);
    if(idx>=0){ ctxPre = idx>0?[ids[idx-1]]:[]; ctxNext = idx<ids.length-1?[ids[idx+1]]:[]; }
  }
  const keep = new Set([id, ...prereqs, ...nexts, ...ctxPre, ...ctxNext]);
  cy.nodes().forEach(n=>{
    const nid=n.id();
    if(nid===id) n.removeClass('dim').addClass('focused');
    else if(prereqs.includes(nid) || ctxPre.includes(nid)) n.removeClass('dim').addClass(ctxPre.includes(nid)&&!prereqs.includes(nid)?'path-ctx':'prereq-node');
    else if(nexts.includes(nid) || ctxNext.includes(nid)) n.removeClass('dim').addClass(ctxNext.includes(nid)&&!nexts.includes(nid)?'path-ctx':'next-node');
    else n.addClass('dim');
  });
  cy.edges().forEach(e=>{
    const s=e.source().id(), t=e.target().id();
    if(!keep.has(s)||!keep.has(t)){ e.addClass('dim'); return; }
    e.removeClass('dim');
    // 按方向着色：前置→当前=青(prereq-edge)；当前→后续=橙(next-edge)；其余=灰(link-edge)
    if(prereqs.includes(s) && t===id) e.addClass('prereq-edge');
    else if(s===id && nexts.includes(t)) e.addClass('next-edge');
    else if(ctxPre.includes(s) && t===id) e.addClass('prereq-edge');
    else if(s===id && ctxNext.includes(t)) e.addClass('next-edge');
    else e.addClass('link-edge');
  });
	  showDetail(id);
	  const goals = goalsUsing(id);
	  const status = nodeStatus(id);
	  const statusText = status==='mastered'?'<span style="color:#22c55e">✓ 已掌握</span>':status==='recommended'?'<span style="color:#fbbf24">★ 推荐学习</span>':'<span style="color:#94a3b8">前置未全掌握（仍可学）</span>';
	  document.getElementById('focusbar').classList.add('show');
	  document.getElementById('focusbar').innerHTML =
	    '<b>'+NODES[id].name+'</b>　'+statusText+
	    (prereqs.length? '　<span style="color:#22d3ee">青=前置</span>':'')+
	    (nexts.length? '　<span style="color:#fb923c">橙=后续</span>':'')+
	    (currentPath&&ctxPre.length+ctxNext.length? '　<span style="color:#e879f9">品红=目标路径上下文</span>':'')+
	    (goals.length? '<br>💡 学完能通往：'+goals.slice(0,4).join('、')+(goals.length>4?' 等':''):'')+
	    '　<button class="mini-btn" onclick="toggleGlobalView()">🌍 展开完整链</button>'+
	    '　<button class="mini-btn" onclick="exitFocus()">✕ 退出</button>';
	  // 等类过渡（200ms）+ 详情面板 flex 布局生效后，一次平滑缩放到子图（不再与过渡动效冲突）
	  setTimeout(() => {
	    const v = cy.elements().filter(el=>!el.hasClass('dim'));
	    refit(v, FIT_PADDING_FOCUS);
	  }, 320);
	}

function toggleGlobalView(){
  if(!focusedNode) return;
  isGlobalView = !isGlobalView;
  if(isGlobalView){
    // 全景：递归取完整链，高亮，其余变暗（但仍可见，不彻底隐藏）
    cy.nodes().removeClass('dim focused prereq-node next-node');
    cy.edges().removeClass('dim link-edge prereq-edge next-edge');
    const allPre = getPrereqChain(focusedNode, 99);
    const allNext = getNextChain(focusedNode, 99);
    const chain = new Set([focusedNode, ...allPre, ...allNext]);
    cy.nodes().forEach(n=>{ if(!chain.has(n.id())) n.addClass('dim'); else if(n.id()===focusedNode) n.addClass('focused'); else if(allPre.has(n.id())) n.addClass('prereq-node'); else n.addClass('next-node'); });
    cy.edges().forEach(e=>{
      const s=e.source().id(), t=e.target().id();
      if(!chain.has(s)||!chain.has(t)){ e.addClass('dim'); return; }
      e.removeClass('dim');
      // 链视图也按方向着色：prereq 链上(指向当前或其前置)的边=青，next 链上(从当前或其后续指出)的边=橙
      if(allPre.has(s) && (t===focusedNode||allPre.has(t))) e.addClass('prereq-edge');
      else if((s===focusedNode||allNext.has(s)) && allNext.has(t)) e.addClass('next-edge');
      else e.addClass('link-edge');
    });
    refit(cy.elements(), FIT_PADDING_OVERVIEW);
  } else { focusNode(focusedNode); }
}

}

function importProgress(ev){
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data || typeof data !== 'object' || !Array.isArray(data.mastered)) throw new Error('文件格式不对');
      if(!confirm('将用备份文件覆盖当前进度，确定？')) { ev.target.value=''; return; }
      if(Array.isArray(data.mastered)){ mastered = new Set(data.mastered.filter(id=>typeof id==='string'&&id in NODES)); saveMastered(); }
      if(Array.isArray(data.masteredItems)){ masteredItems = new Set(data.masteredItems); saveMasteredItems(); }
      if(Array.isArray(data.autoMasterLock)){ autoMasterLock = new Set(data.autoMasterLock); saveAutoMasterLock(); }
      if(Array.isArray(data.starred)){ starred = new Set(data.starred.filter(id=>typeof id==='string'&&id in NODES)); saveStarred(); }
      cy.nodes().forEach(n=>{ n.data('status', nodeStatus(n.id())); n.toggleClass('starred', starred.has(n.id())); });

/* BFS 在 prereq 图上找 from→to 的最短路径（返回路径上的中间节点，不含两端）*/
function bfsBridge(from, to){
  if(from===to || !NODES[from] || !NODES[to]) return [];
  // 邻接：既走 prereq(from→它的prereq) 也走 leads(from→以from为prereq的节点)，双向搜索
  const adj = id => {
    const out = [];
    (NODES[id].prereq||[]).forEach(p=>{ if(NODES[p]) out.push(p); });
    Object.keys(NODES).forEach(k=>{ if((NODES[k].prereq||[]).includes(id)) out.push(k); });
    return out;
  };
  const visited = {[from]:null};
  const queue = [from];
  while(queue.length){
    const cur = queue.shift();
    if(cur===to) break;
    adj(cur).forEach(nxt=>{
      if(!(nxt in visited)){ visited[nxt]=cur; queue.push(nxt); }
    });
  }
  if(!(to in visited)) return [];
  // 回溯路径
  const path=[]; let cur=to;
  while(cur && cur!==from){ path.unshift(cur); cur=visited[cur]; }
  return path.slice(1,-1); // 去掉两端
}

function selectPath(pathId, srcEl){
  currentPath = pathId;
  saveViewState();  // 持久化路径
  const p = PATHS[pathId];
  document.querySelectorAll('#sidebar .item').forEach(el=>el.classList.remove('active'));
  if(srcEl) srcEl.classList.add('active');
  // 手动清除聚焦/类状态，不调 exitFocus/closeDetail 以避免它们内部的 refit 与末尾的 refit 重叠
  focusedNode=null; isGlobalView=false;
  cy.elements().removeClass('dim focused prereq-node next-node path-ctx link-edge prereq-edge next-edge fish-big fish-mid');
  document.getElementById('focusbar').classList.remove('show');
  document.getElementById('detail').classList.remove('show');
  // 路径步骤节点 + 桥接节点（目标终点不再是独立节点，改为高亮路径的最后一步）
  const stepIds = p.steps.map(s=>s.id);
  const need = new Set(stepIds);          // 目标步骤节点（高亮）
  const bridges = new Set();              // 桥接节点（半透明，"路过"）
  for(let i=0;i<stepIds.length-1;i++){
    bfsBridge(stepIds[i], stepIds[i+1]).forEach(b=>{ if(!need.has(b)) bridges.add(b); });
  }
  const lastStepId = stepIds[stepIds.length-1];  // 路径终点=最后一步，给它特殊高亮
  cy.nodes().forEach(n=>{
    const nid=n.id();
    if(nid===lastStepId){ n.removeClass('dim'); n.addClass('path-end'); return; }  // 终点高亮
    if(need.has(nid)){
      n.removeClass('dim');
      if(mastered.has(nid)) n.addClass('path-done'); else n.addClass('path-gap');
    } else if(bridges.size && bridges.has(nid)){
      n.removeClass('dim'); n.addClass('path-ctx');  // 桥接=品红虚线框
    } else {
      n.addClass('dim');
    }
  });
  // 边：步骤节点间的边 = 高亮橙；其余 dim
  cy.edges().forEach(e=>{
    const s=e.source().id(), t=e.target().id();
    e.removeClass('path-edge');
    const sIn = need.has(s)||bridges.has(s), tIn = need.has(t)||bridges.has(t);
    if(sIn && tIn){ e.removeClass('dim'); e.addClass('path-edge'); }
    else { e.addClass('dim'); }
  });
  const visible = cy.nodes().filter(n=> !n.hasClass('dim'));
  refit(visible, FIT_PADDING_FOCUS);
  const pb = document.getElementById('pathbar');
  pb.classList.add('show');
  const gaps = p.steps.filter(s=>!mastered.has(s.id));
  let pills = p.steps.map((s,i)=>{
    const done = mastered.has(s.id);
    return '<span class="pill'+(done?' done':' gap')+'" onclick="showDetail(\''+s.id+'\',\''+pathId+'\')">'+(done?'✓':(i+1))+'.'+NODES[s.id].name+'</span>';
  }).join('');
  pb.innerHTML = '<b>🎯 '+p.name+'</b>　'+p.summary+'<br>进度：'+(p.steps.length-gaps.length)+'/'+p.steps.length+'　<span style="color:#f97316">橙色=待学缺口，绿色=已掌握</span>　按建议顺序学习：<br>'+pills;
}

function doSearch(q){
  q = q.trim().toLowerCase();
  const res = document.getElementById('search-results');
  if(!q){ res.innerHTML='<div class="item" style="cursor:default;color:var(--txt-dim)">输入关键词搜索数学分支</div>'; return; }
  // 按精度排序：name命中(3) > def命中(2) > why命中(1)，避免搜"线性代数"却先出"数与式"
  const hits=[];
  Object.entries(NODES).forEach(([id,n])=>{
    const name=(n.name||'').toLowerCase(), def=(n.def||'').toLowerCase(), why=(n.why||'').toLowerCase();
    let score=0;
    if(name.includes(q)) score=3;
    else if(def.includes(q)) score=2;
    else if(why.includes(q)) score=1;
    if(score>0) hits.push({id,score,name:n.name,layer:n.layer});
  });
  hits.sort((a,b)=>b.score-a.score);
  let html='';
  hits.forEach(h=>{
    const st=nodeStatus(h.id);
    const mark = st==='mastered'?'✓ ':st==='recommended'?'★ ':'';
    html += '<div class="item" onclick="focusNode(\''+h.id+'\')">'+mark+h.name+'<div class="meta">'+LAYERS[h.layer].name+'</div></div>';
  });
  res.innerHTML = html || '<div class="item" style="cursor:default;color:var(--txt-dim)">无结果</div>';
}

  {id:'logic',    label:'数理逻辑基础'},
  {id:'settheory',label:'集合论基础'},
  {id:'ineqsys',label:'不等式与不等式组'},
  {id:'quad',label:'一元二次函数与方程'},
  {id:'explog',label:'指数函数与对数函数'},
  {id:'counting',label:'计数原理（排列组合）'},
  {id:'setlogic',label:'集合与逻辑用语'},
];
// 背景预设：选背景→自动预填已掌握的节点。key 对应 diag-bg 的 data-bg 值。
const BG_PRESET = {
  middle: [],  // 初中：不预填（从零开始）
  high: ['number','function','equation','ineqsys','quad','explog','geom_basic','solidgeom','coords','vector','trig','sequence','counting','setlogic','proof','prob_basic'],
  eng: ['number','function','equation','ineqsys','quad','explog','geom_basic','solidgeom','coords','vector','trig','sequence','counting','setlogic','proof','prob_basic','derivative','complex_num','limit','calculus1','linalg','prob','stats'],
  sci: ['number','function','equation','ineqsys','quad','explog','geom_basic','solidgeom','coords','vector','trig','sequence','counting','setlogic','proof','prob_basic','derivative','complex_num','limit','calculus1','calculus2','linalg','vecspace','prob','stats','series','ode','logic','settheory'],
  math: ['number','function','equation','ineqsys','quad','explog','geom_basic','solidgeom','coords','vector','trig','sequence','counting','setlogic','proof','prob_basic','derivative','complex_num','limit','calculus1','calculus2','linalg','vecspace','prob','stats','series','ode','logic','settheory','abstractalg','topology','realanalysis','complex','funchanalysis'],
};
let diagBg=null, diagGoal=null, _diagLastReport=null;
function diagToggleAllSkills(){
  const skills = document.querySelectorAll('#diag-skills .diag-skill');
  if(!skills.length) return;
  const allActive = [...skills].every(s=>s.classList.contains('active'));
  skills.forEach(s=>s.classList.toggle('active', !allActive));
}

function openDiagnostic(){
  document.getElementById('diag-modal').style.display='flex';
  document.getElementById('diag-result').style.display='none';
  // 渲染目标选项：全部 28 条，按 field 分组（新卡片式结构）
  const goalDiv=document.getElementById('diag-goal');
  const FIELD_LABEL={ '计算机/AI/数据':'💻 计算机 · AI · 数据', '物理与工程':'⚙️ 物理与工程', '密码学与安全':'🔐 密码学与安全', '理论计算机科学':'🎓 理论计算机科学' };
  const byField={};
  Object.entries(PATHS).forEach(([k,p])=>{ (byField[p.field]=byField[p.field]||[]).push([k,p]); });
  let goalHtml='';
  // "暂无明确目标"作为独立首选项
  goalHtml += '<label class="diag-goal-item" style="margin-bottom:2px"><input type="radio" name="diag-goal-radio" value="" style="display:none" onchange="diagPickGoal(this)" checked>🤷 暂无明确目标</label>';
  Object.entries(byField).forEach(([field,items])=>{
    goalHtml += '<div class="diag-goal-group"><div class="diag-goal-group-title">'+(FIELD_LABEL[field]||field)+'</div><div class="diag-goal-items">';
    items.forEach(([k,p])=>{
      goalHtml += '<label class="diag-goal-item"><input type="radio" name="diag-goal-radio" value="'+k+'" style="display:none" onchange="diagPickGoal(this)">'+p.name+'</label>';
    });
    goalHtml += '</div></div>';
  });
  goalDiv.innerHTML = goalHtml;
  // 渲染技能勾选
  document.getElementById('diag-skills').innerHTML=DIAG_SKILLS.map(s=>
    '<span class="diag-skill'+(mastered.has(s.id)?' active':'')+'" data-skill="'+s.id+'" onclick="this.classList.toggle(\'active\')">'+s.label+'</span>'
  ).join('');
}
function closeDiagnostic(){ document.getElementById('diag-modal').style.display='none'; }
function diagPickBg(bg){
  diagBg=bg;
  document.querySelectorAll('#diag-bg .diag-chip').forEach(b=>b.classList.toggle('active',b.dataset.bg===bg));
  // 预填掌握：选背景→自动勾选对应技能（但不立即写入 mastered，等"生成报告"时统一标记）
  const preset = BG_PRESET[bg]||[];
  document.querySelectorAll('#diag-skills .diag-skill').forEach(el=>{
    if(preset.includes(el.dataset.skill)){ el.classList.add('active'); }
  });
}
function diagPickGoal(radio){
  diagGoal=radio.value||null;
  // radio 用 label.active 标记选中
  document.querySelectorAll('#diag-goal .diag-goal-item').forEach(lbl=>lbl.classList.remove('active'));
  radio.parentElement.classList.add('active');
}

function diagGenerate(){
  // 1. 收集勾选的技能 → 标记 mastered
  let newlyMarked=[];
  document.querySelectorAll('#diag-skills .diag-skill.active').forEach(el=>{
    const id=el.dataset.skill;
    if(!mastered.has(id)){ mastered.add(id); saveMastered(); newlyMarked.push(id); }
  });
  // 2. 推荐起点：
  //    若选了目标 → 沿该目标路径找第一个未掌握节点（真正的"下一步"）
  //    若没选目标 → 全图找第一个"未掌握但前置全满足"的节点
  let recommendation=null, blockedBy=null, recommendPath=diagGoal;
  if(diagGoal && PATHS[diagGoal]){
    const steps=PATHS[diagGoal].steps;
    const gap = steps.find(s=>!mastered.has(s.id));
    if(gap){ recommendation=gap.id; }
    else { recommendPath=null; }  // 路径全掌握，走全局推荐
  }
  if(!recommendation){
    recommendPath=null;  // 全局推荐时不绑路径
    for(const id in NODES){
      if(mastered.has(id)) continue;
      const prereqs=NODES[id].prereq||[];
      if(prereqs.length===0){ recommendation=id; break; }
      if(prereqs.every(p=>mastered.has(p))){ recommendation=id; break; }
    }
    if(!recommendation){
      let minBlock=999;
      for(const id in NODES){
        if(mastered.has(id)) continue;
        const missing=(NODES[id].prereq||[]).filter(p=>!mastered.has(p)).length;
        if(missing<minBlock && missing>0){ minBlock=missing; recommendation=id; blockedBy=(NODES[id].prereq||[]).filter(p=>!mastered.has(p)); }
      }
    }
  }
  // 3. 生成报告
  const masteredCount=mastered.size;
  const totalNodes=Object.keys(NODES).length;
  const masteryPct=Math.round(masteredCount/totalNodes*100);
  const bgLabel={middle:'初中',high:'高中学过',eng:'大学工科',sci:'大学理科',math:'数学专业'}[diagBg]||'未选择';
  const goalLabel = diagGoal&&PATHS[diagGoal] ? PATHS[diagGoal].name : '未选择';
  // 路径进度
  let pathProgressHtml='';
  if(diagGoal && PATHS[diagGoal]){
    const steps=PATHS[diagGoal].steps;
    const done=steps.filter(s=>mastered.has(s.id)).length;
    pathProgressHtml='<p>🛤️ 目标 <b>'+PATHS[diagGoal].name+'</b>：'+done+'/'+steps.length+' 节点已掌握</p>';
  }
  let html='<div style="background:#0f172a;border-radius:8px;padding:16px;font-size:13px;line-height:1.8">';
  html+='<div style="color:var(--accent);font-weight:600;margin-bottom:8px">📊 你的诊断报告</div>';
  html+='<p style="color:var(--txt-dim)">背景：'+bgLabel+'　|　目标：'+goalLabel+'</p>';
  if(newlyMarked.length){ html+='<p>✅ 已标记 <b>'+newlyMarked.length+'</b> 个新掌握：'+newlyMarked.map(id=>NODES[id].name).join('、')+'</p>'; }
  html+='<p>📈 当前掌握：<b>'+masteredCount+' / '+totalNodes+'</b> 节点（'+masteryPct+'%）</p>';
  html+=pathProgressHtml;
  if(recommendation){
    html+='<p>🎯 <b>建议下一步</b>：学习 <a onclick="diagStart(\''+recommendation+'\'';
    if(recommendPath) html += ',\''+recommendPath+'\'';
    html += ')" style="color:var(--accent);cursor:pointer;text-decoration:underline">'+NODES[recommendation].name+'</a>';
    if(blockedBy){ html+='<br><span style="color:var(--txt-dim)">（需先补：'+blockedBy.map(id=>NODES[id].name).join('、')+'）</span>'; }
    if(recommendPath) html+='<br><span style="color:var(--txt-dim)">（沿「'+PATHS[recommendPath].name+'」路线）</span>';
    html+='</p>';
  }
  html+='<p style="margin-top:12px"><button onclick="diagDownloadReport()" style="background:var(--panel2);border:1px solid var(--accent);color:var(--accent);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">📄 下载诊断报告</button></p>';
  html+='</div>';
  const r=document.getElementById('diag-result');
  r.innerHTML=html; r.style.display='block';
  // 保存报告数据供下载
  _diagLastReport = { date:new Date().toISOString(), background:bgLabel, goal:goalLabel, masteredCount, totalNodes, masteryPct, newlyMarked:newlyMarked.map(id=>NODES[id].name), recommendation: recommendation?NODES[recommendation].name:null, recommendationPath: recommendPath?PATHS[recommendPath].name:null, blockedBy: blockedBy?blockedBy.map(id=>NODES[id].name):null };
  // 刷新图谱（更新掌握状态着色 + 节点颜色）
  updateProgress();
  if(typeof cy!=='undefined'&&cy.nodes){cy.nodes().forEach(node=>{ node.data('status', nodeStatus(node.id())); });}
  // 自动聚焦推荐起点
  if(recommendation){
    setTimeout(()=>{
      closeDiagnostic();
      if(recommendPath){ currentPath=recommendPath; }
      focusNode(recommendation);
    }, 600);
  }
}
// 点击报告里"建议下一步"链接：关闭诊断+聚焦（带路径上下文）
function diagStart(nodeId, pathId){
  closeDiagnostic();
  if(pathId){ currentPath=pathId; }
  focusNode(nodeId);
}
// 下载真正的诊断报告（文本，非进度备份JSON）
function diagDownloadReport(){
  if(!_diagLastReport){ return; }
  const r=_diagLastReport;
  let txt='数学导航地图 · 学习诊断报告\n';
  txt+='生成时间：'+new Date(r.date).toLocaleString('zh-CN')+'\n';
  txt+='========================================\n\n';
  txt+='数学背景：'+r.background+'\n';
  txt+='学习目标：'+r.goal+'\n\n';
  txt+='掌握情况：'+r.masteredCount+' / '+r.totalNodes+' 节点（'+r.masteryPct+'%）\n';
  if(r.newlyMarked&&r.newlyMarked.length){ txt+='本次新标记：'+r.newlyMarked.join('、')+'\n'; }
  txt+='\n';
  if(r.recommendation){
    txt+='建议下一步：'+r.recommendation+'\n';
    if(r.recommendationPath){ txt+='（沿「'+r.recommendationPath+'」路线）\n'; }
    if(r.blockedBy){ txt+='需先补：'+r.blockedBy.join('、')+'\n'; }
  }
  txt+='\n注：进度备份（含已掌握节点列表）请用页面右上角 ⬇ 按钮导出。';
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='math-atlas-diagnosis-'+new Date().toISOString().slice(0,10)+'.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
